  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0093_WYG_006-1a, image: WYG1240/WYG1240-0529a.png}
body:
  text: 忠靖集巻六明夏原吉撰七言絶句題宋徽宗所畫墨竹寶殿無心論治安碧窻著意冩琅玕枝枝葉葉真瀟灑爭奈金人不愛㸔題元臣王熙端本堂所臨宣和雪天蘆鴈圖宣和失馭宋綱墮端本堂臣素所知何事不陳車覆戒却臨圖畫媚當時二圖畫臨來筆頗精小窻閒翫足娛情祇憐萬里邊城逺毳輦宵奔載不行金陵春日書懷二首凌晨惆悵日行雲目斷行雲更愴神萬里一身歸未得髙堂誰慰白頭親二飄飄書劍泊天涯每到春來輒念家料得故園桃李樹東風吹處一般花題許侍郎所藏許由棄瓢圖耳邊方厭一瓢聲心外寧貪萬乘榮可羨後來嘉遯客謾欺林壑盜虚名題虎石翁萬玉圖一首長枝短枝不著地千花萬花都是春紛紛世上桃與李何爾妖媚欺時人白茆港圖伯爭雄浚白茆萬夫執役不勝勞那知畚鍤聲初歇已有真人著柘袍孔明八陣圖成已絶倫出師二表更忠勤可憐五丈星宵殞後主含酸入魏軍瀟湘夜雨二女南來正斷魂那堪風雨又黄昏瀟瀟無限相思淚都作江邊竹上痕洞庭秋月萬籟無聲玉宇清君山推出一輪明嬋娟倒蘸寒波底驚起魚龍夢不成漁村夕照罷釣分魚各繫船家家晾網荻花邊數聲欸乃炊烟盡猶有餘暉在樹巔山市晴嵐翠微深處簇村㕓茅屋參差樹色鮮欲向箇中沽一醉㝠濛不見酒旗懸隨侍太孫殿下囘南京途中觀射雉野雉驚飛入半空皇孫馳馬試琱弓一聲金鏑雲間響五色離披墮曉風夢親夢裏見親親色好更能繞膝戲萊衣覺來依舊金陵館望斷白雲心欲飛謝鄉友慕宗諒寄暮雲春樹圖寄來圖畫景何新春樹迢迢隔暮雲安得好風吹健翮洞庭湖上重尋君己卯春同中書舍人吳均入閩觀風出京口占曉駕軺車出鳳城栁花風煖繡衣輕入閩料得無多路不向征徒問去程吳中謾興片帆二月過吳門眼底相㸔物物新惟有溪橋桃與李著花渾似故園春將赴華亭踏遍姑蘇水與山又將撥棹向雲間岸花汀鳥休相笑自是吾生不愛閑得家書慈母書來三月初書中教誡意何如重言王事須勤慎不必區區念倚閭過湘城茅屋參差似列星晚風揺曳酒旗青推篷借問此何處舟子無言指故亭過章練塘塘名章練起何時試問村翁盡不知畫舸乘風搥鼓過落花飛絮謾相隨泛澱山湖寒光萬頃拍天浮震澤分來氣勢優寄語蜿蜒波底物如今還肯負舟不千墩㙮雲帆曉抵千墩㙮㙮下人眠喚不醒惟有結巢雙白鶴飛來飛去過池汀經陸直浦浦名陸直因誰得緣有龜䝉故宅基綠醑一杯寒莫酹倚風為誦舊吟詩德清危梁百尺壓清流垂柳千條映小樓詢罷民風閒眺覽溪山渾似舊曾遊題趙侍郎所藏畫三首半尺玻璃冷貯泉一拳瑪瑙暖生烟是誰移種菖蒲草九節通仙更引年右菖蒲石仙子凌晨理醉容餘脂都灑綠雲叢天風一夕開閶闔吹散秋花月月紅右月月紅憶昔雲帆過洞庭萬竿烟雨鷓鴣鳴如今却向圖中㸔無限新情與舊情右竹覽鏡有感憶昔尋春繡野堂滿堂欣羨少年郎曉來試覽窻前鏡兩目生花鬢欲霜題春山曉霽圖羣峯排闥勢糢糊古木撑烟乍有無好似羅湘二三月東郊山翠擁城隅感舊昔年歸去覲松楸里社親朋共勸酬屈指今過十八載故強半是荒丘燕山寄弟原啟金陵别我去瀟湘三見春風總斷腸此日燕山重相憶碧桃又吐小園香金臺午日黄金臺下值端陽橊雨初收晝景長抛却離騷尋枕簟作成清夢入瀟湘七夕河東夜夜望河西目斷心摧路轉迷靈馭幸從今夕㑹天雞慎勿等閒啼閨詞二首秋來強上夕陽樓十二珠簾總上鈎目斷天涯人不見滿懷都是别離愁二鸞鳳分飛鏡影孤鱗鴻杳𣺌信音疎闗山况是多風雪寄去寒衣知道無范增委身項籍竟何成不過區區亞父稱若使當時身入漢良平之次定書名題畫竹瀟湘春雨鷓鴣鳴嫩篠新篁兩岸生北土寒多無一竹披圖何限故鄉情隨侍獵髙唐曉獵髙唐露未乾紛紛雉出林間龍孫舍矢真如破鷹犬相㸔愧素餐書金陵官舍畫屏誰畫雲屏置坐間林巒彷彿似燕山吾親舍此今安否一度㸔屏一愴顔江上即事江上何人學逺遊揚帆鼓浪去無休那知久厯風濤者綠栁隂中穩繫舟題方尚書所藏晦翁書夙興夜寐四字紫陽夫子誨人深四字親書重萬金若使宰予當日見應忘晝寢惜分隂漁牧二首數口團欒舟作屋四時温飽水為田人來或問行藏事不説桐江與渭川右漁寒傍陽坡煖浴河悶吹蘆管倦眠簑寗生當日何為者車底區區扣角歌右牧送春一首燕子鶯兒不住鳴催將春去可憎生今年已向燕山送來嵗還從何處迎洪熙元年春孟欽和御製天不雨雪憂民吟一首瓊花不放舞春陽聖主深憂二麥傷清曉九重天語降便㸔和氣藹穹蒼欽和御製重陽節賜糕酒詩聖主龍飛撫四夷萬方鼔舞樂清時兹維九日頒恩澤皎皎天章著緝熙夢先人二首嚴尊違養屢經春今夕俄從夢裏親應念癡兒未了事九原猶欲誨諄諄二我夢嚴親斷我腸攬衣起誦蓼莪章劬勞㒺極無能報謾灑淋浪淚幾行懷故園竹蕭蕭窻底多情竹别後兒孫長若干寄語家僮好㸔䕶莫嫌日日報平安到京憶樂理軒樂理軒中萬巻書不知消息近何如料應此夕相思處人在南窻月在虛贈魯冕吿老疾還湘君家三徑未全荒何處匆匆促去裝豈是老來腰懶折歸尋元亮學畊桑㸔畫涼生白紵酒醒初四闢筠窻㸔畫圖烟水茫茫山疊疊恍如身在洞庭湖題李教諭臨清軒屋下清流屋上山紅塵飛不到其間晚涼月白酒初醒一曲滄浪閒倚闌再題松風閣神鼇掣斷黄金索化作髯龍立檻前贔屭夜深相激搏道人渾訝臥樓船閑雲二首飄然出岫本無心偶爾從龍學作霖大地枯荄霑既足好尋猿鶴故山深二我愛閑雲盡日閑故來相對一怡顔無端天外微風起吹過南山又北山題畫短棹初移嶽麓時水光山色不勝竒如今客裏㸔圖畫忍把霜毫冩舊詩題嫦娥奔月圖因貪不死偷靈藥遯迹蟾宮實異常何事塵心未能已重將新曲教三郎題吳志道所藏畫竹堦前十箇徒誇美渭曲千竿浪得名何似壁間三四葉頓令庭際俗塵清題畫梅三陽地底未全囘萬玉枝頭已占魁老我羅浮無復夢謾憐香色坐莓苔題趙尚書所藏花鳥四首京兆多情世或羞那知山鳥更風流雙睂畫得天然美肯向東風媚白頭右畫睂瓊枝花發雨晴初林雀銜蟲哺小雛食處饑腸雖暫飽銜來物命肯憐無右哺雛雀緇衣輕拂桂香清終日間闗學巧聲不是趨時弄喉舌朝陽要共鳳和鳴右鴝鵒林木無聲雪色殘一枝晴玉倚琅玕雙禽何處棲來晚重拂金衣度嵗寒右梅竹雙禽秋暮蚊白露瀼瀼水葉稀癡蚊猶自閙窻扉生來祇解趨炎熱未識行藏出處機蜘蛛東挂西牽結網羅心心只欲網蟲蛾寧知一墮兒童手心緒雖多奈若何老馬風霜揺落五花粧畱得枯羸似犬羊幸賴邦家能惠養滿川苜蓿華山陽忠靖集巻六
