body:
  text: 忠靖集巻四明夏原吉撰七言律詩永樂庚寅春扈從之北京臨淮道中口占邊塵不起海波澄萬乘時巡出帝京燕子風清仙仗肅杏花日煖繡旗明髙年首謁均頒帛良吏郊迎屢問名鑾馭行將駐何處黄金臺畔舊王城和胡學士冬至後六日扈從獵龍山同蹇尚書諸公遊牛首山佛窟寺詩韻三首山寺迢迢一徑微山中景趣世應稀花飛澗水驚魚躍風引松雲伴鶴歸朝士來遊無俗駕老僧畱語總禪機囘鞭還從鑾輿後滿路天香暗襲衣二獵罷龍山日未斜更從佛窟訪烟霞半崖寒瀑如飛雪幾樹霜楓似著花茶熟地爐煨榾柮雲畱禪榻䕶袈裟盤桓不盡登臨興並轡歸來浥露華三曉從獵騎過禪闗蘿磴縈紆取次攀兠率巖深千古在辟支佛去幾時還山中有兠率巖乃辟支佛修道之處風幡影動空濛外雲磬聲聞紫翠間借問清修林下士六時禮罷有餘閒題孔明像當年髙遯草廬中誰識先生是臥龍昭烈特勤三顧禮南夷頓服七擒功祇緣佐漢心逾切竟使吞吳恨莫窮今拜遺容千載下不堪吟望永安宮題赤壁圖二客相從赤壁遊當時風景何悠悠山髙月小岸影斷水落石出江聲流化鶴道士夢半夜聽簫嫠婦愁孤舟吁嗟此樂不可復覽圖重為曹䐽羞謁三閭祠先生見放事何如薪視椅桐梁棟樗忍使清心䝉濁垢寧將忠骨葬江魚西風楚國情無限落日滄浪恨有餘我拜遺祠千古下摩挲石刻倍欷歔詠獸吻非熊非虎亦非羆頭角生成藉坎離不向草茅誇氣象直須廊廟著威儀昂昂飽厯風霜苦黙黙多承雨露滋寄語飛飛諸燕雀好來相伴莫相疑問嫦娥試將杯酒問嫦娥月殿迢迢路幾何玉斧修時誰斡運金蟇食後孰揩磨明皇秋夜遊來否太白當年捉得麽我欲乘風攀桂子霓裳肯為舞婆娑嫦娥答獨宿蟾宮春復秋雲泥相隔路悠悠晦明有數非蟇食圓缺惟時豈斧修影捉水中人自醉象懸天上孰能遊欲攀桂子觀仙舞須覓靈槎犯斗牛送禮部員外郎楊旭歸蜀省墓京國長年振轡遊承恩今去省松楸上林鶯送春風酒巫峽猿迎夜月舟題柱長卿真並駕登樓王粲更何愁孝思展罷霜翎健蚤挾天飈覲冕旒過太湖滔滔綿亘五百里三萬六千餘頃寛衆瀆西來天設險三江東注海飛湍影揺霜橘金千樹光浸寒蟾玉一丸欲問陶朱在何處白鷗無語水瀰漫伴梅菊毎羨寒梅獨擅名誰知黄菊也崢嶸籬邊牆角秋冬景雪際霜餘金玉英晚節蹔違元亮約嵗寒同結老逋盟寄言松竹休相妒三友何妨四友并題陳希夷圖聞説真人御九闗騎驢一笑便還山頭巾髙掛蒼松頂足屐深藏翠巘間白石綠莎長日暝清風明月四時閒吁嗟偽隱終南者何獨驅馳不憚煩挽禮部郎中黄鍾父遜翁并序翁本况氏所生六嵗值兵闔門被害鞠於里人黄氏生二子黄乏嗣翁命一子繼其後即鍾焉餘一子歸宗以承况氏之業不欣榮利樂林泉嘉遯龍岡七十年夜月一壺花下酒春風百畝隴頭田承家報國雙雛俊繼絶歸宗二姓全豈謂清宵遼鶴語楚猿愁殺白楊烟慶少保戸部尚書黄宗豫尊翁八十八壽人生七十古稀聞今喜先生近九旬雪鬢霜髯膺寵爵雲林烟岫樂閒身達尊不讓香山老碩望宜聮洛社賓他日繪圖修故事肯容樗朽厠簪紳九日去嵗今朝侍北堂今年此日寓閩鄉紫萸黄菊故園好綠水青山客路長對酒不堪成獨酌吟詩聊用冩清狂明晨喔喔雞聲發何處登車何處航登延平府明逺樓危樓誰搆憲臺東偶得登臨最上重萬井炊烟朝雨後四圍山色夕陽中窻紗掩映琅溪月簾幕飛揚劍浦風安得時閒了公事重凭雕楯翫雲峯擬福建鄉試浩興摧人入建遊棘闈正爾集儒流虹霓氣吐三千字奎璧光浮十二樓天下爭先㸔豹變榜中誰獨占鼇頭殷勤文苑司衡者莫使祥麟後馬牛憩蘇州文正書院觀公所書伯夷頌碑忠厚堂深客到稀時憑雕楯㸔穹碑銀鈎鐡畫中書字玉振金聲吏部辭千古讀來千古懼萬年立處萬年竒瀟瀟落日懷賢淚何獨襄陽石下垂題荷峯雲隱圖萬仭荷峯插漢青當年嘉遯若為情田園無限幽閑趣車馬不聞來往聲半榻松風雲臥冷一溪蘿月釣絲輕只今聖主求賢急林下安能老釣耕菊花枕採得東籬半畝秋裝成一枕著牀頭芳心不管鴛鴦妒清夢時憑蝴蝶遊絶域重明無足儗天孫七寶豈能儔飲餘攜傍梅花臥玊鈿金錢眩醉眸蘆花被似絮如雲覆逺洲掃來拍拍入衾裯夜窻月映滿身雪曉枕風生一夢秋蜀錦吳綾慙艷麗純綿氄毳讓輕柔寄言翰苑風流客還有新詩肯换不𤣥偷食嫦娥染鬢膏便披𤣥褐褪銀袍狡猊乍覩潛三窟老鶴遥窺避九臯晝浴墨池增瑞色曉行雪地見秋毫信知此物非常有贊詠惟慙句不髙插花瓶膽量洪深體態豐不親俗士與村翁金猊瑞鴨常相伴淨几明窻賸見容渴至欲吞三峽水興來遍走百花叢何當淨滌身心垢大士巖前究色空挽故文淵閣大學士胡公光大二首黒頭染翰侍宸旒煜煜才華眷顧優豈謂藏舟移夜壑遽令行轍避西州人間名著黄金榜天上文懸白玉樓此日臨風歌楚些不堪嗚咽淚横流二候直曾占日影塼騎鯨今作月臺仙閣中遺像神如在案上餘文墨尚鮮終始哀榮遭聖主邇遐弔酹走羣賢諸郎更喜多英俊肯墜箕裘不世傳題尚書郁公心逺樓不羨齊雲與摘星小樓數尺自經營琴書有趣天君泰車馬無聲地位清翠剪松雲來几席香飄花雨度軒楹南山况是多佳氣相對悠然萬境明登武夷山觀風偶入武夷行隨處登臨隨處情燒藥爐空無鶴守讀書壇古有猿鳴峯雲隱隱三尖碧溪水盤盤九曲清安得窮躋最髙頂相尋仙子問長生尤溪謁文公先生祠尤溪一派自尼分毓秀儲精此降神攘斥異端扶正教恢𢎞聖道淑斯民源頭活水通洙泗門地清風藹建閩愧我疎庸生已晚謾瞻遺像薦新蘋題呂員外棠岱岳春雲圖岱嶽嵳峩聳碧空春來雲氣幾千重輪囷曉度天門外縹緲時懸日觀東天門日觀皆岱嶽勝境豈是無心閑出岫應知有意欲從龍迢迢遊宦思親者何獨憑髙望不窮題京口醫者蔣彦恒思濟堂巻思濟堂開古潤傍活人有術似長桑丹成龍虎藏金鼎藥配君臣貯綵囊盛業今傳三世美髙名逺播兩京香顧予潦倒霜侵鬢肯授仙家却老方挽祝太僕孟獻故鄉親友久飄零幸識先生在帝京氣宇軒昻髙北斗詞源洋溢隘東瀛㸔花毎並春風轡話舊常同夜雨檠豈意哲人天奪早屋梁落月漫傷情追悼故同寅秦郎中君住闗西我住湘偶從京國共翺翔英英氣宇横霄漢煜煜聲華振廟堂粉署夜談燈照雨金門曉覲帽飛霜嗚呼顔色今何在落月蕭蕭滿屋梁過采石采石江頭夜艤舟攬衣乘興步江樓一天灝氣凝風露萬頃寒波浸斗牛燒燭題詩陳往事倒囊沽酒滌新愁錦袍學士知何在明月娟娟照古丘小孤山我愛兹山異衆山峩峩獨峙海門闗匡廬逺度天風勁巫峽潛通地脈寒上下客舟愁涉險往來鷗鳥喜餘閑何時學得燃犀術下燭神龍萬丈間鴈字鬛鬛霜毫抺綠烟等閑畫破碧雲箋半真不草長空外欲斷仍連落照邊體妙自殊沙上跡勢髙寧似酒中顛恨無楮素如天濶寫出黄庭與世傳挽柳莊袁先生先生蚤踐菊村蹤乃翁號菊村學富才充氣宇雄滄海遇仙傳異術金臺承詔謁重瞳廷玉嘗遇僧號别古崖授以風鑑之術洪武中詣金臺潛邸上謁有重瞳太平真主之語奉祈禮寺恩榮渥解組鄞江壽考終愧我疎庸相見晩束芻聊酹栁莊風挽工部尚書宋公黒髮為官到白頭英名偉績罕能侔兩乘驄馬登烏府四轉清階立鳳樓晚節正期身殉國深宵豈謂壑移舟遥遥旅櫬歸三峽江水無聲猿夜愁福寧縣次吳中書韻金飈刮地雨初晴使者飛颿至海城寶劍光揺秋水碧繡衣香壓瘴烟清既從閭井詢民瘼復向屯營問戍情地僻人淳無箇事但聞村老話昇平寄弟一身為客寓神京兩弟隨親在楚城魚鴈常時傳别字塤箎何日奏和聲願勤燈火寒窻業勿負箕裘先世名嵗晚歸來姜被煖載歌棠棣話心情送參議李守中南歸養病宦轍驅馳數十年今承優詔許南還黄堂粉署無新夢綠水青山有舊緣扶老况存金鼎藥怡情猶剩白雲篇何時我亦辭塵鞅載酒尋君岳麓邊和冬官尚書黄公見寄詩韻昔年杖節撫南夷瘴雨炎風肯憚危毎夜篝燈籌國事隨時焚草畏人知蠻方已喜標銅柱漢殿重㸔賜玉枝漢武帝得西那國玉枝以賜近臣年髙者恨乏堅䂥付彞老為鐫德政去思詩黄公撫鎮交趾二十餘年蠻夷悦服其衰老驛召還京俾復舊任故詩意上念云云午日侍宴橊雨初收午日晴九天開宴集簪纓森森劍珮環龍衮嫋嫋笙歌奏鹿鳴酒進黄封金瀲灧花簪烏帽翠輕盈百僚感戴歡何極拜舞金鑾謝聖明永樂辛卯將用兵于沙漠二月大閲于北京城東時翰林金侍講有詩因次其韻羽書飛召四方兵百萬貔貅集帝城赫赫氣横魚麗陣桓桓威稱虎賁名鑾輿曉閲霜凝葢鐵騎雲屯風颺旌此去烽烟應盡掃薇垣長見泰堦平和胡學士扈從獵陽山詩韻陽山逺在上林東原隰勻勻獸所同萬乘時田親閱騎六師曉從競腰弓霜飛玉盾連營白日照龍旂夾仗紅較藝塲中誰最勝駕前英衞萬夫雄又次胡學士扈從獵武岡山詩韻六龍曉駕不驚塵林壑先生草木春道上迎鑾田舍叟輦前獻賦玉堂臣致禽自合三驅典愛物同推一視仁賸喜太平多瑞應騶虞出後更麒麟兩䝉恩賜倭扇欣戴之餘賦此逺夷効職呈倭扇聖主覃恩賜侍臣捧處九霄紅日近揮來一片白雲新蒲葵側足瞻餘影蟬雀甘心立後塵蕩蕩皇風從此播炎氛清絶萬方春至日喜雪和胡祭酒韻測候無煩六琯灰一陽已趂雪飛來龍墀耿耿銀鋪地鳳闕稜稜玉甃臺柳絮漫從春後舞梅花喜共臘前開殷勤館閣諸英俊好和新詩送酒杯元夜賜宴觀燈應制聖皇御極泰階平閶闔宏開夜散燈熖吐鼇峯星萬㸃光揺鳳闕月三更千官縱翫班頻越百戲爭呈藝絶精自愧疎庸何慶幸年年此夕荷恩榮午日賜觀擊毬射栁詩奏罷南薫駕六龍從容閲武禁城東旌旗隱映花間日鼓吹喧轟栁外風百歩葉穿弓滿月兩朋毬擊馬飛空從臣忻覩呈歌頌吉日車攻詎比隆應制賦黄鸚鵡詩二首色正中央世所竒絳膺丹趾古尤稀逺乘花雨辭滇水髙挹天香覲帝闈上苑金鶯難並侶碧霄黄鵠喜聮飛信斯瑞物非徒致惟我皇仁被九圍二皇仁廣被世雍熙南服祥禽貢玉墀菊羽煌煌金色燦星眸炯炯碧光垂致身幸際千年運調舌能歌萬壽詞好向丹山邀彩鳳銜圖共獻太平時送御史蔣暹乞假歸省金臺諸友詩圖贈餞客裏頻傳送客鐘豈知孱質已成翁狂歌強作江南調薄餞聊隨薊北風柑熟洞庭人足到月明湘水夢誰同凌雲健翮須時奮去去毋淹枳棘叢題人影不言不語過平生步步相隨似有情長向燈前同靜坐每於月下共閒行昨朝離去天將暝今日歸來雨又晴最是行藏堪愛處顯身須要待時明忠靖集巻四
