body:
  text: 忠靖集附錄遺事勅諭誥贈祭文欽賜勅文永樂三年六月二十日勅户部尚書夏原吉都察院僉都御史俞士吉通政司左通政趙居任大理寺少卿袁復今歲蘇松嘉湖數府之民復被水患窮窘艱食聞之切心已勅户部定例賑濟爾等其督令有司即發倉廪濟其急乏毋得後時爾毋縱為奸弊以重困之爾皆為國重臣宜勉竭思慮以惠吾民庶幾副朕急民䘏患之意故勅永樂六年八月十三日勅户部尚書夏原吉爾精細審度事勢動静可回即囘如未可囘即以其故具本宻封就付差去人星夜賫來故勅永樂九年九月十一日皇帝勅諭户部尚書夏原吉尚書喉舌之司户部地官之重非得異才難堪是任惟卿練逹明敏才猷茂著昔事太祖高皇帝克盡乃心奉公守法肆朕即位之初故特簡擢以居兹職卿素心正直不附權勢無縱詭隨竭誠無隱退無後言於國家有所禆益誠所謂純良篤實之臣也今厯任九載考績無過特用嘉奬卿尚益勵直操以表率庶僚以輔朕至治詩曰靡不有初鮮克有終職此為戒欽哉故諭渥恩誥文永樂十年二月初一日奉天承運皇帝制曰為臣能竭誠盡職以事君上而國家推恩及其所生者所以嘉賢勞而勸天下之為人父者爾户部尚書夏原吉故父時敏好義積善忠信有常藴而未施用生賢子敬恭事朕不懈益勤推厥慶源宜加褒寵今特贈爾為資政大夫户部尚書服兹恩命永賁泉扄制曰國家褒榮臣下而推恩及其母者蓋重其所出且以勸孝也爾廖氏子夏原吉為户部尚書恪共厥職於兹有年篤實端謹益勤弗懈推原所自實由令善服兹榮命其懋欽哉制曰國家褒寵臣下而推及其祖父者所以嘉善而廣恩也户部尚書夏原吉故祖希政恭儉淳篤藴德不施詒厥孫子光輔予治溯其所自宜有褒榮特贈爾為資政大夫户部尚書其承寵命永綏後人制曰君之於臣褒榮之命及其先世者所以溥仁恩而隆敦本之義爾劉氏孫夏原吉為户部尚書弼予治化勞効有稱皆由爾積善詒謀式克臻此嘉念所及宜錫顯褒特贈爾為夫人其服茂恩永光泉壤制曰國家推恩臣下既褒榮於其親而必及其伉儷者所以奬賢而厚人倫也户部尚書夏原吉妻鄭氏柔淑静恭克勤内助今特封爾為夫人服此恩榮永光閨閫欽哉洪熙元年正月十一日奉天承運皇帝制曰朕祗紹鴻圖懋興至治永言翊贊眷在老成矧傅元良必簡於忠賢總邦賦必資於惇實兼是三職屬我舊人咨爾太子少傅户部尚書夏原吉和厚坦亮雍容詳雅事我祖考三十餘年勤慎靖共久而不懈秉德執義夷險一心惇愛民之志達為國之經温然君子之風藹然衆臣之表今特命爾為榮祿大夫少保兼太子少傳户部尚書惟予急治之時尤切倚毗之意勿慮崇高而難入勿以有所從違而或怠書曰予違汝弼汝惟欽哉若輔太子必以德厚民生必以仁維時顯庸皆原先帝之意懋爾令績庶副治平之期汝惟懋哉初任户部四川部主事二任户部右侍郎三任户部左侍郎四任户部尚書五任太子少傳户部尚書今任少保兼太子少傅户部尚書制曰夫婦人倫之始故朝廷推恩臣下而必及其家室雖以奬賢勞亦以重大倫也少保兼太子少傅户部尚書夏原吉妻夫人鄭氏静厚有德内助克賢雖在先朝常被恩命今原吉兼職傳保爾亦宜從夫人之貴特申封爾為夫人益茂欽承崇光閨閫制曰臣之仕而能任國重事則國家推恩必及其親斯固以寵賢者亦嘉其有先德焉少保兼太子少傳户部尚書夏原吉故父贈資政大夫户部尚書時敏博學篤行表儀後進崇善𢎞慶埀裕方來致國顯庸在其賢子積勤之已久宜褒榮於所生今特加贈爾為榮祿大夫少保兼太子少傳户部尚書尚克歆承永光幽壤制曰夫親之愛其子與子之孝其親者莫不欲貴也斯皆本諸天性故君之體臣因其所欲而推恩焉少保兼太子少傅户部尚書夏原吉故母封夫人廖氏有德有儀敦隆母道爰有賢子顯庸於朝蓋享祿者三十年常受封於先朝矣今爾子既兼職傅保母以子貴特加贈爾為一品夫人錫賁九原尚其歆服制曰國家令典羣臣勞於君事者咸得推恩榮其祖考矧老成譽望之臣而方屬之以重任者哉少保兼太子少傅户部尚書夏原吉故祖贈資政大夫户部尚書希政惇德勵行晦迹丘園善慶所鍾用生賢孫厯官三紀成績具著顧時朝列實我名臣因勞推恩宜隆所自今特加贈爾為榮祿大夫少保兼太子少傳户部尚書靈其有知服兹榮命制曰為欲其臣盡忠於國則必體其心而從其志自古聖王知人情之莫不孝於其親也制推恩之典以伸奬勸之意朕方任賢德以輔治則必有以榮其親而愜其志少保兼太子少傳户部尚書夏原吉祖妣贈夫人劉氏積善垂慶篤生賢孫朕方付之重任今加贈爾為一品夫人賁命之榮永慰㝠漠制曰積善之久者後必盛効勞之厚者報必加國有輔弼之臣官至於一品階至於榮祿斯則善慶所萃豈一再世之積哉因勞推恩蓋亦至公之典而匪私矣少保兼太子少傅户部尚書夏原吉故曾祖復德裕於躬善及於物慶澤之厚延於曾孫厯任三朝為國名輔酬其庸績宜有茂恩今特贈爾為榮祿大夫少保兼太子少傅户部尚書尚克歆承永光泉壤制曰天子推恩於臣泝而及其三代固以褒答勞績亦嘉念其世澤者逺也少保兼太子少傳户部尚書夏原吉故曾祖妣李氏爾惟曾孫顯庸久矣今國家勵精圖治之時方秉直義為予之輔非爾善慶所積哉今特贈爾為夫人命典之榮永賁幽壤御祭太夫人廖氏文洪熙元年月日皇帝遣行人致祭於故夫人廖氏曰惟爾恭儉柔和儀範閨閫教誨厥子光輔國家頃在先朝肆膺封錫恩命攸隆式臻壽祉遽以疾終爰申恤典以慰九原爾靈不昧尚克享之欽賜勅文宣德三年十月初九日皇帝勅諭少保兼太子少傳户部尚書夏原吉卿祗事祖宗多厯年所忠謨讜議積効勤誠朕嗣統以來尤資贊輔夙夜在念圖善始終蓋以卿春秋高尚典劇司優老待賢禮非攸當况師保之重寅亮為職不煩庶政乃副倚毗可輟户部之務朝夕在朕左右相與討論治理共寧邦家職名俸祿悉如舊卿其專精神審思慮益致嘉猷用稱朕眷注老成之意欽哉故諭賜謚勅文宣德五年正月初四日奉天承運皇帝制曰國家於才德之賢生有封爵殁有贈謚用褒顯之况於輔弼之大臣乎故榮祿大夫少保兼太子少傅户部尚書夏原吉恪秉一心歴事列聖忠亮端實不間始終而於輔朕閲歲亦多嘉謨嘉猷惟篤惟允朕所眷倚期之百年天不憖遺遽失良弼䀌然於懐罔所褒答今贈爾為特進光祿大夫太師謚法推賢盡誠曰忠寛樂令終曰靖賜謚忠靖於戱明良相遇魚水相契朕之於卿何下昔人雖哀榮之有光諒懷思其曷已靈爽不昧尚克歆承優免勅文宣德五年二月初二日勅户部朕惟輔弼大臣與國同體保全永久及其子孫乃稱明良始終之義贈特進光祿大夫太師謚忠靖夏原吉祗事先朝多歴年所攄其忠懇夷險一心朕承大綂以來嘉猷入告益效勤誠遽不憖遺重予永歎其子孫宜特優恤永免本家一應差役以稱朕懷爾户部即下本貫恪遵施行故勅御祭文維宣德五年歲次庚戌正月壬寅朔二十九日庚午皇帝遣禮部尚書胡濙致祭於故少保兼太子少傳户部尚書夏原吉曰卿以淳正寛厚之德歴事祖考以及於今蓋四十年嘉謀嘉猷所以左古朝廷惠利斯民者有君子之風有大臣之體求之古人亦未多見是宜享貴富於永逺懋功業於益隆云胡一疾溘焉長逝訃音之來朕深悼慟嗚呼永樂庚寅之歲卿奉皇祖之命爰來輔朕自時厥後積有啟沃之益今朕嗣承大統方資卿數人者同心同德以建治平而卿遽先殞撫今追昔何能為情今贈卿為特進光祿大夫太師謚忠靖仍官卿子瑄為尚寶司丞用表朕心靈爽如在尚其享之蘇州府欽奉春秋公祭文維𢎞治十二年歲次己未某月朔日直𨽻蘇州府欽奉朝命祭于少傅户部尚書贈太師謚忠靖夏公工部尚書謚文襄周公之靈曰東南數郡國賦所先昔有名臣來莅兹土治水效平成之績理財盡經制之宜人雖亡而政則存歲愈久而澤不替輿情上訴秩典下頒序方屬于仲春秋禮並陳于明薦綂祈歆格以慰瞻依欽命特賜祭田貳拾伍畝守墓僕婢肆口嗚呼我先忠靖公自筮仕即受知于太祖高皇帝逮事文皇仁宣三聖托以股肱心膂之寄建大功而躋大位始終幾四十年幸䝉累朝寵眷特賜誥勅宸翰御祭文若干軸照耀千古真世守之珍寶也先通政府君襄嘗彚次成帙將鋟梓以廣其傳夫何厥志未償而竟遺九原之憾遂使宏休麗澤湮淪沉滅莫能見示於人人可勝歎哉兹勉刻聖製六通冠諸遺事之首雖弗獲悉承庭訓聊以彰君恩揚祖德而少釋墜艧之咎俾覽斯集者庶幾知我朝明良胥慶之美夫豈偶然也耶嘉靖壬寅歲夏季月望後嗣曾孫𢎞濟泣血百拜識按邑誌公曾孫諱𢎞濟謹恪自持潛心書史不慕勢利年八十餘猶好學不倦鄉里咸重之其重刻忠靖公集止載聖製六通多所缺遺士懿因拜公墓見墓前碑石尚存雖字跡半為苔蘚所没然猶可捫讀遂屬裔孫而淇一一抄出合之為二十一通全刻於内以見公當日得君之專功名榮寵始終無憾為史䇿所不多見云齊安後學詹士懿敬書明夏忠靖公遺事原序天生聖君賢輔也不數而亦甚難乎其相遇生而復相遇焉則所以開一代平康之治成乎天所以生物之仁實於是焉在天心無他一干生物人得是心以生非聖君賢輔莫能推而逹之以覆天下而被後世聖君賢輔固天為斯世而生者歟往古勿論已如我高皇帝以至于今聖君賢輔多不世出者其於天所以生物之仁日月雨露風霜雷霆雖愞育凛洌鼔舞震擊之不同然遂其所以仁之之心則一也過也或洩之縮也或嬴之軒也或輊之弛也或張之闢也或翕之閡也或達之紏也或舒之隘也或廓之或引之於前或推之於後或委曲以遇或奮迅以决或黙贊之於無形或顯相之於既著或牖所未明於已明或增所已能於未能或深沉莫知其端倪或嚴重不動乎聲色凡諸䫫是言莫能既位彌高斯仁亦溥年彌久斯仁益究若夏忠靖其一也公自結知高皇傳及列聖皆任以心膂信如筮龜勢利不能敓䜛間不能行行誼可質鬼神忠貞可貫金石詳兹遺事之集公之縮洩弛張黙贊顯相如前所䫫列皆所以致生物之心以成天與列聖之仁卓乎有非一時所能冀者也開我皇明平康之治以基聖子神孫無疆之統天豈偶生公哉禎獲覩兹集敬識數語俾公孫通政君寄序編端庶覽者知公仁者之功遇我列聖有如是云時𢎞治十八年乙丑冬至前二日賜進士嘉議大夫掌詹事府事吏部左侍郎兼翰林院學士南昌張元禎敬識夏忠靖遺事一帙大率與楊文貞公三朝聖諭錄相出入而其氣象之𢎞濶德器之優裕遭逢之正大或過之我國家忠厚一脉源逺流長有由然哉有由然哉予行縣至湘隂得之于其曾孫𢎞濟而讀之有餘感焉遺事舊未有專刻且多所多舛訛公餘畧與較正數字遂鋟之梓俾其子若孫世守而傳焉匪直侈其世美所以昭君度著臣軌勵我後人者三事備矣公之勲業有國事有列傳有神道碑公之文章有蘇常所刻文集六巻楊文定李文正諸老為之序紀載詳明予小子烏乎敢贊一詞嘉靖甲午歲春三月既望毘陵吳仲書夏忠靖公遺事公姓夏氏諱原吉字維喆其先㑹稽人後徙開化唐中和間有諱膺者自開化遷于德興子孫蕃衍至千百計以文武顯于宋元者後先相望為德興名家曽大父諱復博學宏度多與名儒遊才違干時不樂仕訓諸子以義方號松澗大父諱希政倜儻有氣節以鄉薦為元湖廣行省都事兵亂死之家寓沔岳國初始占籍湘陰父諱時敏聰達力學不妄交洪武癸丑以布衣召見有才學俱優之褒授湘陰儒學教諭閭里榮之太夫人廖氏夢三閭大夫降其室生公年甫十三遭父䘮㷀㷀執禮太夫人貞節自誓任衣食訓諸孤公刻志苦學羣籍靡不通尤精詩春秋以家貧勞母夫人心教里塾取束修以資養而婉愉恭侍甚得母夫人歡出入鄉閭其老長皆忘年賓禮之時已負鉅人度喜怒不形家居僻恒有戴大笠若土神者蚤夜䕶公行公心無所動選充邑庠生俗憚為儒見儒冠者輒傷之太夫人泣請免教諭史九韶曰此子氣宇深沉有公輔望寧知非老母榮耶第母忘吾言耳先生慎許可而獨奬勵公謂公文有麒麟鳳凰世不常有一出必為文明之瑞世以為知言以詩經領洪武庚午鄉薦下第入太學被選禁廡冩誥太祖幸書所見公儀閒雅字又方正特賜紗衣一襲復命人至書所察諸書生所為或談笑肆放而獨公端坐正書儼然如在上前上念之二十五年冬十月書滿有司奏當署部職上曰夏某端厚君子勿署特實授户部四川司主事初之任日同官龔郎中有輕公心令吏持數疑事請公判公辭弗獲乃為分處俱當咸驚伏尚書郁公與語大竒之謂所屬曰夏某才器老夫誠不及諸君亦能右乎凡諸曹事有未通者悉委裁之於是同官質疑者日環左右公雖紛冗必為之盡心人人德公如師惟劉郎中恥以事質公又多所不稱為郁所責劉深啣之歲正大朝有司劾其怠事者上悉宥之郁請不已上怒曰是必有教汝要勤者郁股慄少頃上意解旦復諸曹入謝劉出奏曰誠如聖諭尚書有人教之欲隂中公上問郁為誰對曰臣堂後書筭生實教臣為臣愚過聽凟天威甘萬死上曰汝實無罪惟下諸書筭生獄劉謂生等曰何不引夏某以明生曰某多感其德事非所豫安忍累之劉他日復奏曰夏某専尚書之柄前事豫為上曰聞夏某多辦部事甚有匡於尚書何謂專柄汝欲䧟之故為是言於是劉與諸書筭生皆伏誅公遭危譛數矣賴上聖明不聽二十九年冬十一月三載滿當陛引公面陳歸省母且曰臣路遠乏僕乞携輿皂行寛程期上特允之人以為殊典後公每誦及上恩必泣下三十一年六月夏用僉舉陞户部右侍郎公亦協心佐理未幾充採訪使廵撫福建所過郡邑明公寛大人咸悦服尤以表忠賢㧞遺才為首務時楊文敏公為邑庠生公一見器之賦詩期冠秋試有莫使祥麟後馬牛以風司考者文敏遂發解郡有明逺樓多妖宿者必死公愛其爽欲止焉或告之公曰邪非君子所避獨宿竟夜妖遂息識者已知公之雅量足以負重任矣己卯歸鎮蘄州三十五年秋太宗入正大統有執公以獻者上以公太祖舊臣奉公守法轉户部左侍郎公力以疾辭弗允逾月進户部尚書凡貢賦役之制悉命公詳定公酌古今之宜為經久計其所議率從仁厚曰不可使後之難繼戕吾民也永樂初兩浙諸郡大水民不聊生國用告乏上憂之三命公徃治且命僉都御史俞士吉齎水利集賜公公至則奏罷蠧民妨政數十事民大悦詢諸故老究水之由庸其言而執中善則歸人失則疚已每躬先勞之布衣徒歩晝夜經營不遑寢食目為之赤或勸公少休曰吾自安之不為倦雖盛暑不張蓋或持蓋至公曰衆赤體暴日吾忍豫求涼乎時役兵民數萬曲盡撫䘏之道以是人人效用疏壅滯修堤浦濬溝洫治橋梁導滛水以入于海水患乃息又奏發廪粟三十餘萬石以賑饑民躬行督勸散給有方全活甚衆分給牛具種子播時百穀公私俱贍有欲干澤于上者奏以水退淤肥宜召民佃耕以益國用文移扺公所公嘆曰民疲極矣救死不暇况重役乎即馳奏曰車戽則徒勞民力栽種則已失時何益于國上悟事遂寢吳人懷之太子少師姚公廣孝還自浙上首詢公政姚公對曰夏某温而不寵威而不猛古之遺愛也三年秋八月召還掌部事上諭公曰向以部事付郁新以浙農務委卿庶内外克濟今新死矣户部事爾其盡心母怠公首請裁冗食以省浮費量有無以均出入平賦役以蘇民困又言鹽法邊儲所係不許勢要開種以妨商賈錢鈔國用所資不許富室専利以沮貨易以至禁包攬戒侵欺清倉塲廣屯種平價直皆請立定規以施諸天下上嘉納之凡四方所上水旱災傷巨細必報僚屬所言雖寸長片善有益於政者皆採用不遺每量其才而使之故事集而民不擾犯小失恒掩䕶之曰人才難得茍一加譴責則無心向善矣有郎中汚精微批者懼以白公公入奏曰此臣鈐束不嚴之罪也上易批與之不問公嘗以倉庾府帑及丁户田賦盈縮之數備書小帖置䄂中題曰記心時時檢閱經畫有素以備顧問一日上臨朝問公天下糧儲數公言某處幾何某處幾何不差升勺上益親信之時推賞靖難功陞官錫予無虛日又大封親藩屢討四夷創建宮殿增置武衛添設百司財用費億萬計悉取辦於公公經綸康濟生財以仁民庶日殷而國用自足明年春公言江西督責逋負鞭繫累歲加以官吏貪殘民甚苦之請蠲其洪武年間追徵未完賦稅以解民困上勅行之夏六月以初建北京宮殿採木運餉者百萬于道命公暫出廵視自龍山抵北京律治怠事者給以錦衣官校四十人便宜行事公恐犯者衆登車即榜諭官吏軍民俾各供乃事勿懼刑憲於號令中備矜恤意人人感悦而事大集又以淮安為南北之要衝尤宜撫恤之下檄養兵安民郡邑帖然秋八月行次德州上思大用公差錦衣官齎勅召公囘且諭曰行止卿自度之朕不中制也蓋上將巡幸於北欲問公民情安否何如耳七年春二月命兼掌行在户禮二部都察院事扈從車駕廵幸北京公日督運餉以給軍國整朝儀以一㑹同振紀綱以齊百辟上嘉之夏六月命兼掌刑部事執法公平有二指揮冐支倉糧上欲斬之公執奏曰前犯此者俱從律擬今冐支者處斬恐有真盗者將何以加諸上命從律八年春二月上親征北鹵命公輔導皇太孫留守北京兼掌行在六部都察院大理寺事上諭公曰朕以房𤣥齡委卿卿宜盡心輔導皇孫居守時初建京邑諸司草創公負重托鞠躬盡瘁每旦入朝獨近扆前以叅决機務退至政堂郎官御史抱案盈集庭下公口應手判頃刻而畢然雍雍雅度每大事臨前從容裁處不動聲色凡銓選文武經理財賦修明禮樂調遣軍馬詳審刑罰興止營造激揚風紀所以北奏行在南啟東宫下令于天下者皇太孫端拱惟公言是從百官總已以聽庶政丕舉京師肅然秋七月車駕還北京納上行在吏兵刑工部都察院大理寺印十七日召見便殿諭曰卿輔皇孫居守小心勤慎事妥民安朕閲卿所叅决機務咸中事理甚悦朕心公頓首曰皆陛下聖訓皇太孫遵行臣何功之有賜寶緡綵幣鞍馬羊酒翼日上臨朝諭羣臣曰夏某輔導皇孫雖古周公不過如此時仁宗為皇太子監國南京聞之喜命尚書金忠至公第諭太夫人曰聞爾子在北京輔導皇孫有功所叅决機務咸合聖意是由賢母平日教誨所致冬十一月扈從車駕還南京命掌户部事納上行在户禮二部印以從行勞賜休假十日尋命輔導皇太孫周行鄉落以觀民俗仍便宜行事至一村店公先取韲與黍嘗之進于皇太孫曰臣願殿下味此將以知其艱皇太孫乃為嘗韲一莖黍數匙又至一民舍有犯駕者皇太孫怒欲罪之公言臣親承上命所至毋擾吾民罪之非上意也皇太孫從之召見鄉長老令一一陳其風俗疾苦耄者賜之帛節義者表其閭孤獨者給其廪以復其役民皆首香稱嘆駕復有兎逸出道左皇太孫欲馳射之公言今豐草中多狐䑕穴縱驥馴御孰能保不測之蹶乎皇太孫為之止先時上命指揮周敬凡從卒有擾民者執以聞時數卒違犯被執皇太孫令都督李英徃諭釋之敬曰吾奉命執卒而擅釋之是欺上也英還言其傲拒皇太孫召繫敬公為之請皇太孫曰彼恃命甚侮公言有命而卒違之不罪而又繫執者是重違命也不如釋之因而厚賜以勵其直皇太孫立命出敬賜羊酒以勞之繼命輔皇太孫閲武于郊俾知兵事且諭曰此安不忘危之意卿善導之九年秋九月九載奏績上親宴之便殿賜勅奬諭復諭廷臣曰是某太祖高皇帝養成賢德之士爾羣臣欲觀古名臣此其人矣又曰夏某君子中君子也冬十月命公同太子少師姚公廣孝監修太祖實錄舊制非元勲不與監修蓋殊任也後姚公殁公同總裁官楊公榮軰七年㤗勤史事為書二百五十七巻寳訓十五巻上之十一年春二月扈從車駕巡幸北京命輔皇太孫居上營之後俾自親啟沃存問優至十四年秋九月皇太孫自北還南京駕公必進陳所經山川險易民生休戚風俗美惡數事而退忠愛懇到皇太孫甚重之每呼先生而不名凡有令必咨公而後下豫禁所過郡邑遠出迎送兵民晏然有不知駕之至者十五年春三月扈從車駕廵幸北京凡行在一應機宻公多與聞十六年夏五月命提調修纂大明大一統誌秋九月命兼掌禮部事冬十一月罷之十八年秋九月北京宫殿成上以公親臣命召皇太子皇太孫于南京且命諭以授受之意二聖喜公至宴賚有加冬十月公先馳奏上復命公迎之諭曰東宫來宜緩卿行公迎見兩宫于鳳陽固鎮具道上㫖東宮曰雖有命吾其敢緩乎因留公隨輔手書付公同楊公士竒詢訪沿途軍民利病政事得失敷陳以備顧問十二月兩宫至京上問公速來意公對曰東宫久違侍膳一旦聞命思覲天顔不復計行之緩急然臣仰見陛下慈注之深故知東宫孝思之情不得不切也上善其對既而公言連年營造民疲轉輸逃亡者多今宫殿告成宜愛養民力凡各處流徙之民請悉宥之復業蠲其該納之税詔行之十九年夏三殿災公言敬天者所以愛民也今民力已竭宜將累歲所欠貢賦及被災該納芻糧採辦金銀課程悉蠲之賑濟水旱缺食之民優恤流移復業之衆則人心悦而天意囘矣詔行之初府部院寺科道各言南北建都利便不同上命面辯于廷親御午門樓視之宻命中使問公言孰是公對曰臣等罪也科道言是上兩宥之或尤公背初議公曰不然天威嚴重吾軰厯事久言雖失幸上憐之若言官得罪所損不小衆始嘆伏秋八月命兼掌工部事時公雖居户部實兼九卿之任上神武英明羣臣罕稱任使而獨眷注公凡軍國要務必與公面議可否而後行之召見便殿或䦱門語移時左右莫知所議公退則恂恂若無所與者上以是益重公公感上知遇之厚思所以報國者靡或不盡毎承上問即竭誠以對交趾平上問公陞賞孰便公對曰賞費于一時有限陞費于後日無窮臣愚多陞不若重賞上從之惟陞尤功餘皆班賚有差省軍職之半西域法王來朝上將親勞之公言彼慕聖化而來朝將以觀光上國也宜視以君臣崇正之禮有以易其不父子之俗所謂夷入中國則中國之道也且上如是則下必有甚焉將有赴走死而不顧者也禁之則辭之有餘弗禁則恐禮義從此而大壞也上曰爾欲效韓愈耶竟止不勞他日法王見便殿曰上命公拜公長揖而已上曰何卿木强之甚公對曰王微臣序諸侯上况其他乎臣恐一屈膝有辱天子之臣故雖死不敢奉命上笑曰卿過侍郎楊勉之拜獮猴遠矣山東解至唐賽兒妖黨三千餘人將誅之上命公與李慶都御史同錄公審其枉欲生之李有難色公曰上所以命吾等審者正恐其枉安可避嫌濫及無辜即入奏曰臣所錄諸俘俱平人商干彼者為賊所陷且左騐明非真反者上可其奏皆原之衆遮公道曰公生我公叱之曰爾罪當誅此上恩也陜西有偽稱金輪王者報至上亟召公議遣將討之公言亂止數人脅從者衆若將士希功所殘必多而費不貲矣莫若遣廷臣有謀而慎重者徃擒其首餘皆自定從之果無事谷庶人逆謀既彰上問公長沙居人通謀否公對曰謀自干彼無豫居人臣敢以家眷保上信之竟免究上眷公之至雖勲舊元臣莫及皇太孫行冠禮有司奏請大臣一人司之以尚書蹇義方賓名進上曰惟夏某相宜特命公行禮上元禁節張燈許臣民同樂公奉太夫人與觀上知之及晡宴文武羣臣于燈山下顧問公曰適聞爾母來觀燈尚在此否公曰已歸矣上曰爾以賢才為國家用皆爾母賢淑訓育所致命徹御案暨寶緡賜之公弟原啓至京上召見賜酒饌瀕歸上命人送之舟中行李蕭然惟麥二石上異日顧問公曰聞卿弟行槖甚空盍少贈之公對曰臣所遺俸資先已寄歸適無所有故不及贈上笑曰何不告朕助卿賜異布數匹十九年秋上議親征沙漠羣臣莫敢言公曰吾受上厚恩不可不死諍之約方賓尚書同諫謂曰公但來吾自言之入免冠叩首言頻年師出無功戎馬儲積十䘮八九又聖體少安尚在調䕶遠濡風霜誠未便况今災眚迭作内外俱疲民不堪命甚可慮雖邊冦犯順請遣將勿煩六師上即命公整邊儲于口北方尚書懼自縊死遂䕶罪併籍公家惟有賜鈔千貫餘皆布衣瓦器而已命錦衣官立限取公囘錦衣至公方啓厫理儲錦衣促公行公曰姑少俟畢此行不然恐有侵漁患死吾安之不以累公錦衣如其言至京稽限半日上問之錦衣以公言對上御門問公北征得失公從容對千餘言謂自古帝王專修内治不事遠畧彼化外之民反側是其常性惟固守邊疆詰爾戎兵來則拒之去則勿追可也歴言周漢及魏上命繫公内官監皇太孫屢上請宥公久之上察公忠間以國事訪公公敷對如平時又命中使覘公動静因曰上昔待公厚而今繫之竣寧無怨乎公曰風雨霜露莫非教也何敢怨焉語上聞寛之二十三年秋七月車駕至榆木川不豫顧左右曰夏某誠有忠愛朕心語未畢而駕晏八月㐫聞至仁宗為皇太子親臨公繫所有㫖急召公公禁繫嚴不知外事且久不被召驟聞命披衣急趨出見皇太子立中庭泣謂公曰卿知否近得楊榮報父皇賓天公伏地痛哭不覺失聲上益感慟命公起慰勞之曰卿可出視事公叩首曰臣先帝罪人未聞遺詔敢希寵乎語良久駕囘命中使賜御厨饌給紙筆咨以國事公即上言以用費於不急祿耗於官冗情壅于言塞政急于少康積弊逮今未能遽革在任當其人而圖之以漸又曰今民力竭于東南戎伍疲于漕運宜幸南京庶幾少蘇内外之困上曰朕意亦然上以初政詔條訪公公請撫流移恤鰥寡賑饑民寛逋負省賦役禁科歛罷下西洋寶船及雲南交阯採辦金寶香料各處闕金銀課程數事皆見施行上即位首復公户部尚書賜冠帶衣服靴襪被褥帷帳器用俱傋公以母喪未終辭不受命異日上御西角門早朝顧問輔臣曰不見夏尚書説事蹇尚書對曰夏某有母服未終乞歸守制上曰卿可勉留之促令視事立召公至便殿公泣言臣被繫時有母喪未克成服乞歸故山終憂制臣事陛下日未艾也上曰卿老成人不幸國有大事正賴相與共濟艱難安得遽去卿云有喪服我無喪服乎如卿辭職朕亦不當在此卿必留贊輔公固辭上留益篤公退上十餘疏上終不允公哀毁骨立上下憐之哭聲夜徹㕔外人不忍聞皇太子正位東宫命公兼太子少傳公力辭不允時吕震為太子少師班在公上見之諭鴻臚曰夏某先朝碩德舊臣宜右震命引震次公即進公少保兼太子少傅户部尚書食三俸公固辭上曰位以任賢祿以酬勞卿勿固辭公請不已許辭太子少傳俸公感激知無不言尚寳袁忠徹以風鑒得幸太宗上以其言甞不遜首欲誅之公諫曰忠徹言誕罪固當誅然禮以親之所愛雖親没而子待之終身不衰况今山陵未畢而刑遽加于近侍之臣柰先帝所愛何上從輕罷忠徹官冬十月上御西角門視朝罷時風寒顧謂公等曰朕與卿等居重城中猶覺凛凛如此守邊將士晝夜嚴警殆不可勝遂命書勅遣使以鈔幣賜沿邊將士公進曰朝廷待守邊將士厚矣既豫給禦寒之具又䝉恩如此昔楚子以寒而拊三軍皆如挾纊彼徒施温言人尚感激况今受實恩敢昧報效但願陛下常推此心不忘耳上曰人君視天下萬物為一體况將士為國家躬勤勞瘁豈敢須㬰忘之朕所行或有不及須卿等輔翼古人有言為君盡君道為臣盡臣道朕與卿等各盡其道可也十一月上與公論及屯田事上曰先帝所立屯田法甚善蓋用心亦甚至但後來所司數以征徭擾之既失其時遂無其效所儲蓄十不及二三有事不免勞民轉輸其令天下衛所凡屯田軍士自今不許擅差妨其農務違者處以重法公對曰先帝經營天下二十餘年所立兵民法度俱盡善盡美陛下每事遵行天下幸甚上以公忠亮益倚重之每朝罷必親呼公等二三大臣近御扆前或隨至便殿面議政務畢方囘宫遇有急務賜手敇訪公行凡内外諸司所進章疏多命公先條進其㫖而後從中批出或謂公所條㫖多云某部知道而不斷者何也公曰予奪之柄非臣下所敢專故付之六部定其可否而復取上裁庶事有所分而權不下移也洪熙元年春正月上將郊祀欲下仁民之詔咨議于公公請命風憲督勸農桑以充衣食之本所司廪贍窮民以廣好生之仁增文武官吏俸給以勸亷能弛山林湖沼之利以公民用寛逋負賦役以安流徙之民補積欠月糧以養將士之勇屯田將卒不許差占以妨農務四方災傷即令奏報以慿寛恤皆施行之上以天不雨雪賜公憂民吟且命賡之有交修之意兼賜玉帶未幾命公同貴臣宴四夷吕尚書以位次請上曰夏某朕之股肱四夷所仰位宜居中翰林進呈公等誥詞上親増二語曰勿畏崇高而難入勿以有所從違而或怠且諭曰此朕實心蓋望公等匡輔之切也繼召公至扆前賜繩愆紏繆銀印一諭曰卿忠在國家朕聞皇考賓天時嘆卿忠愛特兹眷倚繼自今朕有過舉卿但具奏以此封識進來朕不憚從也公頓首謝曰主聖則臣直臣雖愚敢不仰承休命自是屢有所陳上嘉納之未期歲而仁政周于天下矣三月上手勅公等欲除臠割鞭背連坐妖言誹謗之刑公同二三大臣宻議以聞詔皆行之夏四月命兼掌禮部事特賜象牙正直印押以便處分且以旌公秉心正直云公言今山東及淮徐諸郡累歲旱潦無收民甚艱食至父母妻孥不相保請寛恤之上即詔全免夏税及秋糧之半一切科𣲖收買物料悉罷之未幾手勅諭公曰古云斧斤以時入山林材木不可勝用近西山樵採者將諸樹根伐盡卿宜掲榜示衆犯者斬之以狥公言樹根之伐固所當禁而人命為尤重也是以王者之政先人而後物故孔子於廐焚傷人乎不及馬今薪伐過當罪止不應請從律議為宜上從其言以公有匡輔功賜田五頃于八里庄及建第二所千兩京以褒之五月李時勉廷諍過激上怒欲刑之晩諭公等曰李時勉當朝辱朕諭已天顔大變公進曰時勉小臣之言豈能傷損聖德願陛下少霽天威下法司議定罪之未晩也從之仁宗賓天公受顧命時宣宗為皇太子監國南京中外洶洶有漢庶人之憂太后以公東宫舊輔凡軍國事悉命公裁處公宻謀急迎駕還京駕將至羣臣出迎太后宻命公留佐襄王監國上見輔臣首問公安在蹇少師等莫能對上不悦駕至京召公慰曰近見太后諭所以留卿意朕方知之卿奉皇祖命輔朕有年朕以卿非他人比卿當以事皇祖者事朕加賜寶帶時䘮禮及即位之儀皆具皆公一二人所豫定諭衆勅草命公等刪削詔赦之議多主公言每朝呼召面議政務及手勅咨訪國事悉如仁考初公同蹇少師二楊少傅同心輔政蹇重厚多謀公含𢎞能斷文貞博古守正文敏明逹有為中外稱為得人上時與公等面議久命坐賜茶或命退殿廡少休復至扆前論議上尤以心腹托公朝退之暇不時獨召公宻切顧問或䄂中出小帖子親付公手公亦或有所呈於上凡中外所進章疏専命公批荅或批未及命携出條㫖許用小票墨書帖各疏面以進中易紅書批出或未批多命公傳㫖處分公日孜孜惟謹所受聖諭及納誨于上者未嘗退以語人凡諸公謀猷之善者力贊成之不自有其功先修太宗實錄命公監修至是復命公監修仁宗實錄國朝文臣三豫監修者惟公一人而已宣德元年秋七月上以山東無麥詔蠲其税且諭公曰稷思天下有饑者猶已饑之伊尹作相一夫失所若撻于市卿國之大臣宜體此心公叩首曰臣敢不仰承聖訓八月漢庶人謀反移檄誣輔臣奸邪亂政以公為首蓋惡公等得君贊治不利于已也上夜召公等入議公免冠頓首曰臣不才致變親藩罪當死上曰卿何為是言彼蓋假卿以興兵耳休戚與卿同之命分坐宻議屏左右語楊文敏公首勸上親征上難之顧公公曰往事可鑒不可失也臣昨見命將而其色變退語臣等而泣在廷如此則其臨事可知又曰兵事貴速且有辭宜巻甲韜戈而往一鼓而平之所謂先人有奪人之心也楊榮言是上意遂决即躬率六師征之晝夜兼程而往師臨城漢庶人懼欲降猶令人繞城上詈公罪人既得大被恩賞賜公閽者三人掖公朝叅出入公固辭曰舊制非勲臣不敢用上曰卿輔導忠勤非勲而何公乃拜賜尚書郭敦使武定州囘為同使者譛于上公言臣待罪尚書時敦為侍郎深知其人亷慎公直惟法是執且能屏絶私囑以是怨之者多惟陛下察之上曰朕今知之矣譛竟不行二年秋八月上燕閒公侍側因語及古人信䜛事上曰讒慝小人真能變白為黑誣正為邪聽其言若忠究其心則險是以帝舜堲讒説孔子遠佞人唐太宗以為國之賊朕如此等每切防閑若有其萌必杜絶之不使奸言得入枉害忠良齊殺斛律光國遂以弱朕常非之汲黯正直奸邪寢謀卿等所宜務也公頓首謝曰陛下之明羣臣之幸也臣敢不效愚直以仰荅聖心十月交阯既叛屢遣將征之未利至是請降廷議惡其反覆更欲興兵上以問公公對曰兵疲財竭不可再舉如癰伏于身未潰則憂不測已潰則可緩治宜進以平劑加之資補俟血氣調和而自愈若不小忍而惟毒之攻浸滛不已心腹内虚恐患復生於他所不可不虞今莫若因彼上表謝罪許其復國自新吾人之在彼者令䕶之出境則恩結其心而亦無他虞矣時二楊少傳亦有是言上是之遂偃兵息民有寶緡上尊之賜十一月皇太子肇生上命公等條陳仁政數事詔天下有銀器寶緡綵幣之賜三年春正月公同蹇少師奏對便殿上悦命留侍宴且諭盡歡上顧公醉笑曰卿能復飲乎公頓首曰臣飽沃天恩醉矣上顧蹇公猶醒親酌巨觥三賜之公拜上顧公有欲言之色問曰卿有言乎公近扆前宻請蚤建皇儲為宗社之本上曰然朕當奏太后行之二月以議國本勅召至便殿奬諭賜範金銀印八曰含宏貞靖謙謙齋以褒公之德量曰後天下樂以表公之忠勤曰傅保之臣以期公之寅亮餘著公之名字世系鄉邑也尋加翠爐銀甕玉鉤玉帶之賜三月命公等侍遊西苑以騎隨公騎後乘輿甚邇𨽻之從公者私相問曰前龍衣而髯者非至尊乎上聞而顧之公惶懼下馬謝曰天威咫尺而臣不能肅下罪無所容上笑曰朴實哉卿𨽻也人賜鈔十五貫復命登御舟遊太液池上顧公等曰以操以御羣卿之力君臣之義休戚是同上射鳬獲之既烹躬割以㗖公又親酌玉觥以爵公曰卿於朕啟沃良多而今老矣不可不盡歡日晡而罷上以苑多竒石可愛命内臣吳誠偕公徃觀且諭曰惟其所欲與之公但取尤小者一二而已内臣曰苑竒石巨者以萬數先生弗欲乎公曰某性鮮所好柰上恩不敢辭况欲其甚者乎内臣以聞上嘆其介者久之閏四月公言山西饑民流徙南陽諸郡十餘萬有司軍衛各遣人捕逐民死亡者多上即遣官徃同布政司及府縣官加意撫恤發廪給之隨所至居住敢有捕逐者罪之民賴得所秋八月復命公等侍遊東苑上指草舍一區諭曰此朕致齋之所雖不敢比古人茅茨不剪之意然庶幾不忘乎儉矣公頓首曰陛下言及此天下蒼生之福書曰非知之艱行之惟艱陛下知而行之尭舜之治亦不過是九月扈從車駕巡邊賜寶刀上命取公槖糗甞之笑曰卿亦食此粗糲耶公對曰臣食此足矣隨營將士尚多餒者上命中貴取上供者賜公遍加將士之犒勞上還京念公等四人高年且師保之重以寅亮為職不煩庶政乃特賜勅輟部院務俾專論道左右共寧邦家隱然拜相之意前此所未有也公益殫忠讜以報上知四年冬十月公奏對便殿上問公時政之弊公言今内外諸司遇有公務輒坐委掌印正官出辦取其事之易集殊不知正官乃一司之長百責所萃今不論事之重輕一槩委之致使䕶印署事者茍簡于政吏肆其奸庶務妨廢時弊莫甚于此上曰非卿不聞是言即勅諸司禁約違者許言官紏之未幾扈從車駕閲武郊外至兎兒山上怒諸將奉命之不䖍也命禠其衣以辱之公言將帥國之爪牙天威震怒罪且不測况時嚴寒倘致于斃是因微罪而殺重臣上不應起入帳内公隨之上顧見公曰卿且休公對曰陛下憐臣之恩至諸將瀕于死矣陛下獨不為之念哉上笑曰朕特為卿釋之還京公因奏對言今天下雖稱承平民困未全蘇息各處買辦催徵差官數多甚是擾民以致小民怨咨罔知朝廷優恤之意請勅禁約諸司非急務不許差官如出差擾民者許風憲紏察以聞上從之上寵眷公日優使者召公日數十軰于道家有御賜名馬性甚靈每召臨馬必蹄嚙閽者報公具衣冠出而錦衣人至矣上嘗張燈宴羣臣悦甚咲謂公等曰此朕擎天柱也天下付若等朕高枕無憂矣賜紫瑛硯象牙翠花筆龍香墨水晶鎮紙玉筆架以便條㫖用公誕晨上親繪壽星圖及製詩賜之有獨生申甫扶鴻運之褒每憂喜及節序必賜公詩又親繪秋香竹梅二圖以喻公之晩節文禽非熊春霽魚遊春水數圖以彰公之遭遇之盛云至服食器用銀幣日不虚賜嘗命尚方取一翠甌賜公公拜賜訖上咲曰卿夫人得無競乎復加賜一焉又命製束髪小玉冠二枚上用其一以一賜公諭曰使卿之子孫知吾君臣一體也公寵愈優而心愈小恒懷負乘之憂朝囘于家而色若有不懌然者夫人問之公曰吾欲進諫適思所以悟者未獲故悒悒耳又嘗撫案嘆息筆欲下而止者再夫人問之公曰吾適所批者歲終大辟奏也吾筆一下而死生决矣茍有可生吾未嘗不欲生之恐悞焉則彼啣無窮之寃而吾懷終身之恨矣以是慘沮而筆不忍下也五年春正月兩朝實錄成公同太師英國公等上之賜宴賚旦入謝暮歸得末疾猶執筆條㫖以進夜薨未薨前三日有星墜庭之西南隅光燭地者久之方息上早朝聞訃震悼遂輟朝垂涕囘宫左右感動莫能仰視朝自公卿大夫及郎官將校下至閭巷小民莫不嘆息咨嗟至有泫然流涕者上問輔臣議加公封爵楊文貞公對曰舊制文官不許封公侯恐因某為例例不可自今日始某輔導舊臣贈以太師亦尊榮矣乃贈特進光禄大夫太師謚忠靖賻祭殯塟有加常典官其子瑄為尚寶司丞期以讀書大用仍勅户部復其家國朝輔臣贈太師及䘏典之隆自公始也公天性孝友公退未嘗離太夫人側每早朝必候問起居而後去太夫人殁公不忍正坐每被寵賜必捧泣曰此上恩也吾母不及見矣吾敢私乎遍分諸弟姪及姻舊之貧者愛二弟稱篤季性躁使酒一日醉壞公釀器家人奔告曰叔破缶而罄酒矣公笑曰弟又醉耶公二俸在南京者皆季所費然公恒以賜物分寄之或曰俸悉彼用而賜又及之耶公曰手足情重俸何惜焉且上恩之霑不可不均也其德量汪洋人莫測其際嘗使蘇有庖人烹肉過鹹公但嚥素飯而已無所問巡視淮陰憇于野馬驚而逸從者逐未返公遥謂過客寄聲尋馬者客不應且詈之從者執以見公公笑釋之小𨽻盗公銀酒器數事為邏者所獲械見公公命釋械語之曰爾非艱甚寧忍為此乎仍與所盗一杯遣之𨽻感泣而去有進士戲乘公肩輿或告公公曰有志言者慚退祭酒胡公僦屋居公既賜第即以舊第讓之胡致仕公鬻第以為贐故胡挽公詩有琴書携去嘗推宅吕尚書為子乞官上以問公公對曰震先朝有守城功宜量與一官可也或語公曰彼昔奏公公寧㤀之乎公曰某自得罪彼何與焉平江恭襄公靖難時嘗欲害公後公薦恭襄總漕運又内贊其所請以濟國事二公深自敬服上嘗賜公銀酒器公留用于部堂或勸公私之公曰以上之寵賜而私之可乎且吾以布素起家亦豈能勝此也時同事有性褊者嘗書公姓于座右以自警少忘之性如舊嘆曰夏公真不可及也或問公量可學乎公曰某㓜時有犯者未嘗不怒始忍于色中忍于心久則自熟殊不與人較某何曾不自學來又曰處有事當如無事處大事當如小事若先自張惶則中便無主矣故厯事累朝秉節執義夷險一心其論大政决大疑羣議滿前公徐一言而定或有偏執已見奮然沮衆議者公從容喻以義理曰某所見當如此處是至上前奏之果如公議沮之者莫能奪事賴以濟尤樂薦引士䫫布滿中外皆稱其職然恩不已出有自布衣至公卿而不知公之薦者仁皇嘗欲用李衡為兵部侍郎問吏部不知命問公人始知公之薦周文襄為長史時廷臣有欲薦為郡守者公言于上曰郡守不足以展其才上于周名注留著别用四字尋致大用至薦李襄城公隆守備南京黄忠宣公贊理漕運皆極一時之選其援人之急惜人之才惟恐不及都御史劉觀孫女被選將入内皇親胡都督往駕焉上聞之欲誅觀惡其結托也公言觀昔事先帝每稱其能偶因戚里之嫌遽加大辟非罪疑惟輕之典上意少解竟以他事罷觀職有禮部署堂郎中某于早朝奏云四夷之來賞不及用宜豫措置上不荅某懼甚退以告公公曰以富有四海而當廷云云可乎乃為於午朝之間而宻陳之果得所請户部李郎中暹性絃急屬吏有悞者李欲置于法吏懼而投匭首實上特免之李怪吏之不先白已也叱曰上雖宥爾於法終不可釋吏遽以其辭奏之上怒其言渉不敬將刑之公言某素剛直偶因吏之激言發于暴若遽刑之恐長奸吏風况今募人使遠若宥而任之必能盡忠贖愆如此則恩法兩盡而吏亦無以長其奸也上從之李使于闐果不辱命刑部金尚書以疾在告蹇忠定公有㑹乃赴之上聞之不樂曰以疾不朝而宴于私可乎命繫之公言進退大臣當以禮可殺而不可辱金某老矣而繫辱之非刑不上大夫之意上即宥之有短楊文貞于上者上以問公公力為辯之眷任彌篤故贈公誥有推賢盡誠之褒每勸朝廷行一善政用一善人或問公公曰此天子之明羣公之力某何與焉凡所上奏草歸即焚之曰不可彰吾直也以是嘉謨嘉猷所以左右朝廷惠利斯民者冺然無迹不盡傳于天下惟天與列聖知之豈敢誣哉黄忠宣公嘗贊公德足以格君而不言其直量足以容物而不言其善身足以任天下之重而不言其功休休揖遜有古良臣之風時以為確論焉附治水疏見明紀永樂元年秋八月遣都察院僉都御史俞士吉齎水利集賜户部尚書夏原吉使講求疏治之法原吉上言江南諸郡蘇松最居下流常嘉湖三郡土田高多下少環以太湖亘綿五百里納杭湖宣歙諸山水注澱山諸湖入三泖頃浦港湮塞滙流漲溢傷害苖稼拯治之法宜浚吳淞諸浦港洩其壅淤以入于海吳淞江袤二百餘里廣五百餘丈西接太湖東通海前代屢疏以當潮汐沙泥淤積旋疏旋塞自吳江長橋至下界浦約百二十餘里雖稍通流多有淺窄又自下界浦抵上海南倉浦口可百三十餘里潮汐壅障茭蘆叢生已成平陸欲即開浚工費浩大臣相視得嘉定劉家港即古婁江徑通大海常熟白茆港徑入大江皆廣川浚流宜疏吳淞江南北兩岸安平等浦港引太湖諸水入劉家白茆二港使直注海松江大黄浦乃通吳淞要道下流壅塞難即疏浚傍有范家濵至南倉浦口可徑達海宜浚令深濶上接大黄浦以逹泖湖之水此即禹貢三江入海之迹俟既開通相度地勢各置石閘以時啟閉每歲水涸時修圩岸以禦暴流疏上命行之水以洩農田大利題故太師户部尚書夏忠靖公遺事後昔孟子有言五百年必有王者興其間必有名世者予嘗厯考古昔聖賢之生皆本於氣化之盛故自堯舜至於湯五百有餘年自湯至於文武亦五百有餘年蓋天地清明渾厚之氣運於亭毒之表者久則有時而漓故必積之之久而後復盛盛則聖君賢相出焉蓋天地實生之也自文武之後七百餘年而始有漢高祖自高祖之後又七百餘年而始有唐太宗高祖太宗雖不足比隆堯舜湯文當時佐命之臣雖不足以擬跡周召然君臣同心以成正大光明之業庸非天意乎自唐太宗之後更五代之亂朱梁石晉劉漢郭周簒弑相承而貞元之氣其漓也甚矣天醜其德而聖君賢相不出於其時至越千餘年而後我太祖高皇帝生焉復二帝三王之盛而無漢髙唐太之雜霸當時佐命之臣固非一人若故太師户部尚書夏忠靖公尤其傑然者也非應期而生者乎喬新生也晩不及拜公之舄履而嘗聞先公言公為尚書時先公為御史永樂二十二年雷震奉天殿下詔求言言者多云建都北京非便而主事蕭儀言之尤峻太宗震怒加以極刑時六科十三道上言者多云朝廷不當輕去金陵建都於燕故有此變上曰方遷都時朕與大臣宻議數月而後行非輕舉也言者因劾大臣上命言官與大臣俱跪在午門前對辯時都御史陳英等迎合上意且謂昔日不諫有罪抗言御史給事中白面書生不知大計宜加重罪日將午上命侍臣出至午門問大臣與言官對如何衆皆譁然啐罵言官妄言公獨從容奏曰御史職當言路給事中朝廷耳目之官况應詔陳言所言皆當臣等備員大臣不能協贊大議臣等合當有罪侍臣入復命上仍命出再問公對如初天顔悅懌遂傳㫖令各囘衙門辦事而言官無一人得罪者衆謂非公之言則又將有蕭儀之誅矣公心存忠孝無時忘之當洪武之末嘗巡撫福建所至問民疾苦而惠鮮之詢吏治得失而進退之其𤨏屑細事則悉付之有司官民皆安焉嘗出漳州北門見有舊塜將頽者問諸左右或對曰元達嚕噶齊徳哷黙色之墓守死不降民哀之故塟於此公曰忠臣也命有司伐石整其墳樹碑而表之他日往福寧見道傍一草菴敝陋殊甚而灑掃潔淨問左右或對曰此元福寧尹王伯顔與其子相及子婦潘氏死節于此民既塟之又作草菴以祀焉公曰伯顔死於忠其子死于孝婦死于節無愧卞壼家矣遂命知縣遷其主入佛寺空屋祀之且設祭焉公之惓惓忠義已見於此矣及自福建召還太宗皇帝欲大用之忌者或沮之曰彼建文用事之臣豈宜寘之高位上曰夏某父皇太祖之臣也彼忠於太祖故終於建文又豈不盡心于朕哉厯事太宗仁宗宣宗其盛德大烈有補於國家者尤多其詳已見於楊文貞公神道碑及國史有傳足以不朽矣喬新後生小子不敢贅一言以取不韙之罪謹述聞於先公者于末簡以信孟子之言俾後世有考焉先公又言蘇文忠有言國之將興必有世德之臣厚施不食其報然後子孫能與守文之主共享太平之福公厯相四朝其所施厚矣享其榮名盛福者五十餘年而天之報公亦不薄矣其子太常公有文武才德宜與公世濟其美者也然位不滿其德其孫叅議君好徳而文其名位所就勛業所建以名世者未可量也他日躋大位建大勛而與伊尹伊陟繼美有商者其在兹乎喬新既頓首以為皇明賀又拜首以為夏氏慶𢎞治庚申六月資政大夫刑部尚書廣昌後學何喬新謹識䟦夏忠靖公遺事右少保兼太子少傅户部尚書贈特進光祿大夫太師謚忠靖長沙夏公遺事一通其郡人寧鄉袁侍御公大倫得諸其孫通政公廷章而刻公集後者也福獲讀而歎曰公其社稷臣哉我太宗嘗謂以房𤣥齡處公而福觀公諫太宗親征沙漠處有以兼魏徵沮高麗之直楊文貞公謂比公於王子明韓稚圭之度而福觀公勸宣宗親討漢庶人之叛有以兼冦凖伐澶淵之毅解大紳公稱其有德有量而不及其口應手判之敏才黄忠宣公贊其雍容揖遜而不及其𢎞濟艱難之卓見若是者有一足以命世而公兼之豈非社稷臣哉何司冦公謂天實生之不誣矣其尤難者在太宗朝輔導皇太孫居守北京而北奏南啟之皆得其心迎召皇太子皇太孫于南京而緩速對復之曲當其義在仁宗初親臨繫所而敷奏切中在宣宗初南京入繼而禮儀皆具三朝始終於是乎正矣豈非社稷臣哉若今所行於朝廷者皆仍公條進批荅之舊曰某部知道榜於郡縣者尚遵公禁約擅差掌印正官之議在當時不以為竒而今則始悟其見之遠也其謂多陞不如重賞禁差徵辦官尤若預知今日者然至於營捄諫官之議遷都不拜西域法王諍李時勉之死辯郭敦之譛斷罪必依於律者皆足以立一代之治體其贊仁宗省刑薄賦與夫户部出納之省約即位詔赦之蠲除至今莫之能改皆百姓由之而不知者噫公豈非社稷臣哉福少讀郡誌訪父老知公與周文襄公為惠於吾土者甚大已思欲一發闡之今天子命二公合祠于蘇福嘗記周公之祠于松者而獨於公為欠事又嘗讀宋石介慶厯聖德詩序謂天下所望為宰相諫官者無不舉用以為盛兹集序之者為大學士茶陵李西涯公内相如西涯臺諫如大倫亦天下之望乎二公於其鄉先正國名臣不忘其遠如此而今有復如忠靖公者出其肯掩之耶長沙社稷之臣又于二公乎望矣乃敢附名於其末𢎞治十四年辛酉春三月朔賜進士及第翰林國史編修儒林郎華亭後學錢福謹䟦士懿伏讀忠靖公遺事厯事四朝雖始終職在户部又兼各部及都察院輔皇太孫百官總已以聽叅决機務擬批詔㫖致治隆平實名宰相也先軰巨公若二楊公碑誌李文正公傳何錢二公䟦論之詳矣子小子何敢復贅惟是治水江南至今吳人德之乃遺事止言治水之勤其講求治水一疏略焉不載士懿攷諸明史竊按天下財賦半在江南天下之水半歸吳㑹浙西及蘇松諸郡以逮杭湖宣歙萬山之水奔涌騰溢盡入太湖太湖蓄瀦之餘溢於三江東流入海所謂三江既入震澤底定是也然三江無可入之道則震澤無可定之波乃吳淞婁江率皆淤塞黄浦白茆僅見虚名江海之門洩㵼既少震澤汪洋承流遂緩矣加以山水沙多暴漲飄流勢稍緩則沙易聚瀕湖諸泖相繼堙蕪矣不知浙之嘉湖地據上流故溪不入湖則嘉湖代受震澤之水吳之蘇松勢居下流故湖不入江蘇松且代受三江之水賴公躬親履勘始稱太湖汎溢宜浚吳淞蘇之吳淞多沙泥旋疏旋淤松之吳淞多茭葦易成平陸因請於嘉定開劉家港常熟開白茆港而蘇水入海於松江更開范家濆以達大黄浦而松水亦入海廣濬分支共受三江之水即所謂三江既入多為尾閭以殺震澤之怒即所謂震澤底定禹貢明白簡盡而公之治之亦委曲詳至即於此一疏見之顧可畧耶予故采諸明史以附遺事之後庶幾千百世下鑒公苦心其功當不在禹下云康熙四十四年乙酉孟春月齊安後學詹士懿敬識校刻夏忠靖公集成敬述嗚呼忠靖公靈秀鍾國器生當有明初厥考席氊地少小解勤學失怙倍䇿勵端方禀慈訓菽水率二弟婉愉得歡心鄉黨推行誼喜怒嘗不形已負大人志未幾領鄉薦太學勤講肄遂受太祖知農部主厥事漕務當叢脞理繁弗辭勩攄誠析羣疑同官服高義晉階撫閩軍愛民先察吏成祖深眷注連陟尚書位治水師禹功疏决發神智放海獲安瀾吳人食其利况乃賑民饑全活千萬計恩施逮官校矜恤尤備至扈從攝諸曹輔守稱上意擬諸古名臣寵錫三代貤披鱗效朱雲忠讜甘拘係仁宗復徵起公以母喪避馳諭期協心曰卿朕攸倚玉帶環腰圍殊榮耀門第愆謬繩且紏煌煌燦金字得君古良難盡瘁亦匪易禮儀故嫻熟除難見經濟􅅤𢎞復貞静表德銀章記維時春秋高褒嘉示優異庶務毋久煩啟沃資謀議兩朝實錄成宴賚有特賜勲名震寰宇勞謙贊盛治至性門内全仁厚遐邇被扶顛更振乏接物展光霽襟期浩以深疇復窺其際休休有容德包荒無巨細子明稚圭風雅度真無媿忠勤厯四朝夷險歸一致騎箕當宁惻宣廟為墮淚謚法酌古今曠典營塟祭生榮死亦哀慶澤流後裔閑情寓詩文不朽兼游藝天真弄柔翰豈為章句累懿忝諭湘膠景慕多年歲執鞭既無從拜墓讀碑誌人以文乃傳遺集嗟失次捜羅魯魚辨編就喜不寐三春日摩挲髣髴風騷氣殫力事雕鐫庶以垂奕世少保兼太子少傳户部尚書贈特進光祿大夫謚忠靖夏公神道碑銘賜資榮祿大夫兵部尚書華蓋殿大學士廬陵楊士竒撰中順大夫詹事府少詹事兼翰林侍讀學士廬陵曽棨書資善大夫禮部尚書毘陵胡濙篆公姓夏氏諱原吉字維喆始家饒之德興曾祖復祖希政元末為湖廣行省都事兵亂死之考時敏為湘隂縣儒學教諭遂家湘隂公自㓜端厚好學年十三教諭公殁益知自勵母夫人廖守節教子公終父喪即出教里塾取束修以資養而率其二弟恭侍婉愉得母夫人歡心出入鄉閭其老長皆忘年賓禮之時已負鉅人度喜怒不形里少年嘗被酒侮慢公里人共擊之詈之曰汝小人不知鄉有君子耶有鬼物白晝附人言禍福驚動里中或强公往觀卒無所言他日復有言或問之故曰夏公端人吾不可以近公一無所動心洪武庚午公以詩經選鄉貢入太學遂擢户部前四川部主事授承直郎進承德郎漕務叢脞凡倉廋府帑之出入簡牘之著悉有條理同官後至於事有未通者咸以質公日環左右公雖紛冗必為之盡心蓋人人德公如師陞户部右侍郎授嘉議大夫巡撫福建所過郡邑考察吏治咨訪民隱公明寛大民人咸悦服太宗皇帝入正大統轉左侍郎逾月陞户部尚書授資善大夫永樂初蘇松諸郡大水命徃治發浙西兵民十數萬疏决壅滯自松江黄浦東北以逹於海水患乃息而撫恤曲當久不言勞又撫綏其饑民發廪三十餘萬石賑之散給有方於東南命公自南京扺北京督視運送給以錦衣衛官校且命有不率命便宜行事公於號令中備矝恤之意人人効用太宗巡守北京公豫扈從命兼行在禮部都察院事歲餘車駕親征沙漠今上以皇嫡長孫留守北京命公輔導庶事修舉京師肅然太宗還良喜賜公鈔千緡綵幣四表裏羊酒鞍馬自是屢奉命侍命上有司奏公與吏部尚書蹇公厯官九載皆賜嘉奬有淳良篤實如古名臣之諭太宗親宴之别殿無幾賜誥命追封祖考皆為資善大夫户部尚書祖妣為夫人封母為太夫人重修太祖皇帝實錄命公監修書成賜鈔千緡織錦文綺衣壹襲文綺表裏三對北京宫殿成奉勅召仁宗皇帝及今上於南京二聖喜公至賜宴勞及鈔白金鞍馬外冦復犯邊太宗皇帝將親征公言今邊儲不足請遣將無煩六師遂罷官仁宗皇帝嗣位即日復公户部尚書公以母喪未終辭仁宗曰國家不幸有大事正朕與卿等協心比力之時如卿以親喪辭則朕亦未當在此公乃不敢復言遂加太保仍兼户部尚書賜玉帶闕十七字今上正位東宫加公兼太子少傅少保尚書二職如故賜誥命追封曾祖祖考皆為榮祿大夫少保兼太子少傅户部尚書曾祖妣祖妣妣皆一品夫人賜金章一其文曰繩愆紏繆且諭曰朕有過舉卿但具奏來以此識之朕不難於從善賜鈔萬緡御用米二十石胡椒二百斤公感知遇之厚鞠躬小心靡或不盡修太宗實錄命公監修仁宗皇帝崩時今上建國南京至則喪禮及即位之儀皆具皆公三四人者所預定上既嗣大位公以舊輔尤重倚任公益孳孳惟謹寵賚日盛修仁宗皇帝實錄仍為監修庶人高煦反上親率六師擒之公預扈從還賜白金文綺等物甚厚賜銀圖書一其文曰含𢎞貞静蓋褒公之德云明年扈從巡北邊既還上念公及少師蹇義等四人者皆春秋高思優逸之賜勅嘉勞輟職務仍其祿朝夕侍上傋顧問預謀議而恩遇益厚兩朝實錄成賜白金百兩織錦羅衣一襲文綺表裏六對鞍馬賜宴明旦入謝暮歸第得末疾遂薨宣德五年正月二十七日也壽六十有五歲上聞訃震悼遣禮部尚書胡濙賜祭贈特進光祿大夫太師賜謚忠靖賻鈔萬緡勅有司營喪塟官其子瑄為尚寶司丞仍復其家復屢遣濙等賜祭朝臣自公侯貴戚下至郎曹將校咸往弔祭衛卒巷氓亦有太息流涕者公天性至孝友其弟原啟原禮皆厚原啟殁愛其子如子讀書鄉校時教諭史九韶雖非授業師遇之必拜雖貴不變既貴九韶陞教國子月恒分之䘵九韶將老朝廷從公請命致事公與人交久而敬平生故人在患難或賙給之遇士之貧者賑之有顛蹶失所者援之德雖微必報而未嘗存怨惡心接人温然處事善善長而惡惡短襟宇瀞深閎闊不見涯涘嘗有從𨽻汚公金織賜衣懼欲逃者公曰汚可浣何懼為有吏壞公所寶硯石匿不敢見公召吏諭之曰物皆有壞吾未嘗惜此慰遣之於時卿大夫雅量推公第一知者蓋比公王子明韓稚圭之度其在上前所言必歸仁厚臨政必酌大體其預宥宻雖冺然無迹蓋有陰受其德者矣故不問貴賤疎戚識不識皆知其為善人長者文章喜為詩四方士重公名得其一篇一詠藏以為榮公配鄭氏有賢德再封一品太夫人子珫瑄瑛璘女一嫁虞㻞珫與虞氏女皆先卒公薨之三月歸塟湘陰其家以墓碑屬予予與公同朝三十年晩益親厚相知又常為予道其平生予豈謂遂誌公之墓耶銘曰􅑴夏厥初以國為氏衍於㑹稽綿綿厥系太末之邑後來徙居暨唐中和復徙于番懿夏之時逢掖其服詩書有承德善有續轉鄂而潭自公祖考積厚必發公奮起紹燕歌鹿鳴來與計偕官任其賢政用其才繇司徒屬暨掌邦教寅恭小心寛仁允蹈參决大議洊任重負不亟不徐雍容雅度如彼喬嶽嶷然不移其氣黙運澤潤良多祗事列聖既四十載夷險一道其舄几几國有老成堂有柱石遽不憖遺當宁興惻既榮且哀隆隆寵光嗚呼忠靖没世不忘宣德五年閏月初六日孤子瑄璘泣血立石贈榮祿大夫少保兼太子少傅户部尚書夏公夫人廖氏墓誌銘中順大夫詹事府少詹事兼翰林院侍讀學士廬陵曾棨撰榮祿大夫少師兼吏部尚書西蜀蹇義書廣平程南奉政大夫吏部稽勲司郎中兼翰林侍書雲篆宣德庚戌春正月丁卯少保兼太子少傅户部尚書夏公原吉卒卒之後又八月公之子瑄詣予泣拜請曰先祖妣夫人既塟未有銘恐懿德久而遂冺敢請一言刻之石庶幾永終有賴焉予弗獲辭按狀夫人姓廖諱妙賢世為荆州人父瑞可有學行授徒于鄉元季僑居沔之玉沙時忠靖公大父希政碑刻璿疑誤為湖廣行省都事兵亂死節公之父時敏奉母避地于沔瑞可見而竒之遂以夫人妻焉國朝平定海内時敏仕為湘陰儒學教諭遂家湘陰教諭君殁時公年纔十有三夫人守節自誓孝養其姑劉氏朝夕未嘗暫離姑疾侍湯藥尤謹至寢食弗遑憂見顔面姑臨終執夫人手泣曰汝事我孝敬願汝子婦他日皆如汝之事我也姑殁塟祭皆克盡禮夫人撫育諸子教之務學期底于成諸子亦克祗承其教有所植立公既領鄉薦升太學仕為户部主事陞右侍郎迎夫人就養京師䝉恩封太淑人及公為尚書贈父教諭君為資政大夫户部尚書夫人進封太夫人方是時朝之大臣罕有親尚在者獨夫人年高鶴髪雲冠朱翟命服偉然坐堂上歲時自六卿以下相率羅拜人皆謂太夫人盛福世鮮及焉上元節禁中張燈公奉太夫人入觀太宗皇帝知之顧左右曰此賢母也賜鈔千緡永樂辛丑議親征沙漠公言今糧餉弗給任一將可也無煩聖躬遂坐免官明年壬寅四月十八日太夫人以疾終享年八十仁宗皇帝即位詔復公户部尚書公乞終喪不許遂加少保兼户部尚書命給舟載太夫人喪歸塟湘陰縣治之東北山之原勅有司為造墳塋未幾復加公兼太子少傅賜誥命追贈夫人為一品夫人太夫人三子長即公累官至少保兼太子少傅户部尚書贈特進光祿大夫太師謚忠靖次原啟原禮女二人長蚤世次適常州府照磨葛興讓孫男四人珫瑄瑛璘瑄為公後嗣年纔十有三䝉恩命為尚寶司丞給六品祿女四人長適傳時省監察御史霖之子也次適虞㻞宗人府經歴進之子也次適宋敏湘陰縣知縣綸之子也餘㓜銘曰夫人之德慈惠静貞秉節守義訓子于成子既顯榮高爵厚祿祿養以豐享兹盛福錫命推恩冠服是煌鸞誥薦頒龍文天章湘陰之原爰視爰度靈秀所鍾體魄斯託懿範徽音愈遠弗忘銘以昭之永世其光宣德九年六月日孤哀子原吉孝孫泣血立石附錄明故中順大夫南京大常寺少卿掌尚寶司事夏公行狀公姓夏氏諱瑄字韞輝其先自衢徙饒代有顯者曽祖諱希政元季為湖廣行省都事兵亂死事祖諱時敏洪武初為湘陰教諭遂家湘陰考太師忠靖公諱原吉厯事太祖太宗仁宗宣宗四朝碩德雅量豐功偉烈著在國史公忠靖公次子少穎敏喜讀書嘗竊觀忠靖奏草及忠靖朝退必請問所議事忠靖笑曰是非爾所知也然心黙喜之禮部尚書胡公濙嘗夢上以櫻桃一盤賜忠靖二子長子珫退避不敢受而公獨受賜後珫早卒胡公以告忠靖曰繼夏氏者必此子也仁廟嘗顧問忠靖曰卿子年幾何欲以近侍官之忠靖曰臣子㓜稚非食祿時俟成立事陛下未晩也宣德五年忠靖薨宣廟震悼不已即日遣中官致命于家拜公尚寶司丞明日公與叔父原禮入謝時公年甫十有三進退有度特賜冠帶衣服公扶柩歸鄉里宣廟憫公㓜特免守制使養母于官而别遣官䕶喪歸且厚恤其家公强記過人太師張公輔呼為小友少師蹇公義而下多公父執禮重之宣廟欲大用公未逮也正統初英廟追念忠靖勤勞特賜公田十八頃而蠲其稅楊文敏公榮將歸謂公曰尚寶非處君地吾還當薦君未幾楊公卒不果雲南夷逆命公上疏乞立功自効尚書王公驥竒之將以公徃有沮公者乃已八年命視尚寶司事公以母疾乞侍養還鄉母愈乃就職時四方多事公上疏陳七事一謂湖廣苗本異種必有首惡紏合為冦宜密令諸脇從諭以利害誘以重賞使反兵相攻然後出其不意攻之必破一謂苖出遠刼必使老弱守寨宜分兵間擣其巢穴則賊分而勢寡一謂北邊雖每歲朝貢其情難測宜令知兵者行邊旌勇智退老弱繕兵治械修城隍謹烽堠以備不虞一謂福建盗作雖出師勦捕功久不就使賊勢日張民困轉輸不得耕食是益盗也宜督將臣乘時殄滅多見采納十四年北邊犯京師公憂憤陳四事一謂敵乘勝遠闘其鋒不可當然能野戰短攻城宜堅壁勿戰使進無所得退復氣沮然後出竒設伏諸道奮擊破之必矣一謂敵深入吾地宜令死士夜襲其營仍設伏内地以待追者一謂敵既舉國入冦邊無所禦宜調邊兵之半入捍京城内外夾攻彼將自潰一謂我軍依城為營進無死志退有所歸宜嚴號令以堅其志如以三隊為法前隊戰退令中隊悉斬以狥容而不斬者同罪則士畏法而不畏敵矣詔亟行之後敵使至公又言敵無故遣使與吾譯者偕來必佯為遜辭以緩我應援疑我進退覘我虚實或為誑事虚情疑我譯者以緩我謀賂我譯者令為反間宜慎防之以觀其變一謂敵若引退宜分兵五路間道襲之以正兵二路擊其前以竒兵二路攻其傍以伏兵一路絶其後仍以宣府大同諸路邀其歸蓋彼方恃强不虞吾至且待彼囘圖我而我先奪其心勢可必破况今太陰犯昴主明不利太白出高用兵敢戰吉臣以為天道人事機不可失當道不能盡用其言識者惜之公又言敵既得利今冬來春必圖再冦今汝寧鳳陽諸府及河徙故地流移之民無慮百萬恐因隙而動為患不淺願假臣便宜使招募智勇以為國用仍條陳事宜以為先召吏士及其故老俾各舉所知凡舉主其所舉勞以酒幣掲名于旗以倡忠義然後榜諭凡有知兵敢戰習騎射諳地利能為間諜者許以官賞復其家一丁以給其力事平之後不願為兵者釋之教閲之法以百人為率擇其能者十人以教其九十人兵集既衆人人習戰法内可以捍京邑外可以消􅇿縣之變事下兵部尚書于公謙請試用其才侍郎王公偉公知已也時為監察御史亦請勅公募兵淮楊㑹事定不果久之公以母老乞就養金陵命掌南京尚寳司事二月丁鄭夫人憂上京師復陳三事曰賞罰以為御將不可不嚴任吏不可不寛宜罪敗師棄守之將以戒不忠增亷官能吏之祿以礪不任曰去利以為善治國者不損民以益已因舉近事以利致害者貪鄰入貢致生邊患窮兵麓川以疲中國其弊在上汚吏凟民以妨文治貪將虐兵以耗軍伍其弊在下宜減浮費以輕徭賦省游食以足軍儲惜民力以培邦本又謂貴州宜仍洪武舊制置行都司罷藩臬郡縣命一良將輔以文臣使專决于外以寧邊患曰審機以為制敵之機係乎攻守之得失因舉近事之失機者敵初冦大同氣鋭鋒利不當戰而與戰以致敗績一也宣府懲彼失利畏慎大過敵經其城當戰而不與戰以致土木之敗二也及敵越重關犯畿甸自納其死而我過為防禦無所施措以致大變三也宜鑒覆轍懷逺圖揚天威以雪國恥大學士高公穀見公疏薦于朝亦不果用奉使秦府充册封副使凡所賜遺悉不受天順二年公以疾請命掌南京尚寶司事踰月遷少卿八年賜誥命特贈所生母王氏為夫人成化二年進為卿時五府多闕惟都督一人公奏守衛事重非一人可任乃命曰某某徃守宿衛十四年九載考最陞南京太常寺少卿仍掌尚寶司事方啚請老歸守先墓無何疾卒未卒五日猶力疾草疏大畧言臣伏見太宗文皇帝賜皇太孫勅諭皆農桑軍國為政治民之要誠祖宗詒謀之至意願陛下置諸左右覽而行之仍命皇太子讀誦使預知民事艱難守成不易則不必遠求諸古而天下可治臣懷此言久未敢輒上今臣病死旦夕死而不言永無日矣命其子崇文上之訃聞上遣官諭祭于南京公為人寛厚簡易内剛外和孝悌忠懇皆出天性㓜䘮王夫人事鄭夫人甚謹常棄官走南北侍養者十餘年鄭夫人卒女嫁虞氏生子誠而孤公視若已子悉以鄭夫人遺物并分賜田三頃予之誠死又撫厚其孤與弟璘無間言異色親舊患難力可援者必為之盡侍郎王公卒公娶其女為子婦其師太常少卿鄭公雍言子死經理其家駙馬井公某道死嘗以千金托公其家弗知也公悉封識還之公恂恂寡言及辨議古今成敗兵民利病文體高下皆卓有定見不隨時好惡然自負高與人寡合故罕有知者為詩文宏博豪放舉筆千百言而感世觸物義歸于正平生所作近百號拙寓稿晩年號白鶴山人自為傳論曰人為其庸腐者是也謂其非庸腐者亦是也夫璞玉一也器則玉未器則璞耳今山人久為宦而無所見其能是將為玉耶亦將為璞耶識者必能辨之公雖在散地恒憂先天下每見天垂象或四方有警則咨念不置與客言必先問及北事常曰國家養士於平居之時士當効力於有事之日嘗夢中賦詩云臣愚思効忠志欲追前古空懷葵藿誠未罄朝陽吐深思結衷腸逺慮遍寰宇舍生寧顧軀矢死期報主病篤猶以地震為問語不及私惟書遺教囑其子崇文皆檢身奉職語又賦一辭亂曰梅花一枝開春風雙珮嚮拂衣而歸天清月朗造化小兒齊聲合掌遂卒公生于永樂戊戌三月十五日卒于成化辛丑二月十七日享年六十有四子三人長崇文戊戌進士材器竒博不下公世次崇武次崇勲俱學舉子女五人長某次某某年月某日歸塟忠靖公墓側公卒已有銘銘頗略崇文復備述行實請為狀以干大人先生銘諸神道以昭不朽東陽公同􅇿人也哀公之殁慨典型之在鄉里者不可復見謹序次一二以備采擇謹狀茶陵李東陽撰贈冝人周氏改塟誌并銘亡妻周氏字慧貞其先自楊徙燕厥考諱敬以功戰多竒拜指揮僉事宣德間命鎮遼之金海蓋州以勇馳邊卒於其鎮宜人其冡女也㓜偕其母夫人臧氏留京夫人有賢行而善教冝人亦婉順克從年甫十七而歸於吾時先考忠靖公已捐舘者五年矣惟先妣太夫人尚無恙冝人以不獲逮事于舅為恨每遇烝嘗忌辰必躬㓗簠簋而極其誠敬侍太夫人朝夕不敢以寒暑而少怠丼㫖務豐而處已恒持于約太夫人以是尤愛之常曰是婦也志與吾合吾老矣不負夫所託復何憾哉余少也多過冝人恒規以正從焉則喜否焉則戚余幸而免于顛亦賴其相焉耳生二子曰長孫曰延壽俱早夭夫人傷之遂捐疾終于邑之澄清坊里第生永樂戊戌三月十六日卒正統四年冬十一月十三日享年二十有二權厝于門外八里之庄蓋以余宦於南北者未定也余後以養疾得請於朝仕於南都者久之以恩命始贈其室冝人余嘗歉然於心而不忘者以域兆之期尚未卜也成化十二年余以事朝京師值墓主守者俱物故廬田入他人之區馬鬛之封已平訪之於隣嫗而後得焉哀慘切骨泣曰余負之余負之何以立天地間更號丈夫為嗚呼宜人之殁距今三十有八年古今之變遷也如此使後更數十年將復何如耶或曰死者得藏于土安矣而子慟之毋乃勞乎余曰朋友死無所歸于我嬪矧夫婦焉茍于是而賻之則他可知矣余忝有祿食之享而忍乎其妻之骸之枯以自若可乎此予所以决于意而不卜其吉與否也七月一日告以文而啓之曰嗚呼糟糠之故結髪之盟每愧予懷何以為情自伊云殁歲月徂征主守陵替孤魂㷀㷀柩返于湘以祔先塋體得以蔽永保攸寧庶幾始終以見平生告已書於石而銘之辭曰生而同室死而同藏嗚呼兹言吾何敢忘南京尚寶司卿夫夏瑄撰并書忠靖集附錄
