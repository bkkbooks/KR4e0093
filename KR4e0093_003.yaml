body:
  text: 忠靖集巻三明夏原吉撰七言古詩欽和御製元夕觀燈詩皇明受命基圖隆挺生太祖真豪雄手提一旅淮甸起指顧六合妖氛空三綱再張九鼎奠萬姓子附諸侯崇天威逺振沙漠外陽光直麗扶桑東神功聖德邁五帝文謨武烈超三宗九重弼亮盡賢俊庶職甄別無凡庸時清化洽頌聲作弗問逺邇同渢渢握符御厯餘四紀創業垂統無終窮我皇繼體主神器勵精圖治心忡忡齊莊中正奉天道寛仁恭儉勤民功九區平寧遂生息萬方熙皥無憂恫兹惟嵗首值佳節天清氣朗春融融鼇峰倐忽聳丹陛雲嶂突兀撑髙穹浮屠寶殿更竒絶遥瞻彷彿靈山同金蓮萬朶吐清夜森森景象生光中教坊讙譁奏百戲舞衫歌袖飄青紅六街禁弛九闗闢衣冠雲集笙簫樷皇恩如天更開宴霞漿香送龍樓風羣僚百辟何慶幸明時盛事年年逢况臣居位食厚祿庸庸罔有涓埃忠虞廷賡歌今喜見願備九奏諧歌工鞠躬百拜向金闕上祈聖壽髙羲農巍巍宗社磐石固穰穰年穀田疇豐竒祥嘉瑞日軿集惟民惟物成雍雍洪熙乙巳秋仲賜觀内苑珍禽竒獸應制賦六龍初御乾坤肅玉燭和調民物育爰開禁籞集廷臣少肆餘閑閲竒畜時維秋仲天氣清纎塵不起香風輕虞官圉宰雜遝進珍禽瑞獸紛紜呈狻猊側踞真雄猛鉤爪金毛睛炯炯彩毬戲罷拂霜髯百獸潛窺敢馳騁須臾𤣥鹿來軒墀豐肌黭黮猶烏犀若非食野霑煤雨應是尋泉墮墨池雙羊繼出仍珍美腹若垂囊背如砥煌煌寶轡輕籠頭軋軋朱輪低載尾花隂小大霜姿猿金環約項聲隆然盤旋倐忽作人立何殊雪洞飛來仙又看福禄并神鹿毛質鮮龎實靈物羚羊緩步蒼苔邊修角撐空亦竒獨柙中玉鼠潔且馴朱櫻貫目脂塗唇想應竊餌瓊芝足故㸔銀袍覲紫宸駝雞聳立誰其侶駢趾青瞳髙尺許或時振翼將何如志在衝霄學鵬舉雕籠鸚鵡色更竒細觀熟玩心㤀疲呈祥雖未銜圖瑞調舌應能唱壽詞三三兩兩賓郎雀短喙珊瑚新琢削飛翔寶檻恣喧呼似欲臨風脱金鑰徘徊重覩花斑雞冠丹頰翠衣裳緇是誰巧把晴空雪散作身章若綴􅋒載欣載羨雙鳩鳥質傅鉛花光皎皎雄雌並立清飈前貞靜幽閑一何好多情尤有白畫睂雙睂畫得天然殊從今京兆多才思對此應慙畫不如盆池一物龜相類出没清波名玳瑁錦鱗日映光陸離誰數南溟紫文貝吁嗟致此誠非常皆由聖德通遐方遐方感慕貢珍異故兹苑囿多輝光我皇繼體朝羣辟螻蟻微臣幸供職如斯一一承恩觀拜舞金門喜何極願言聖德超虞唐普天率土咸來王諸祥畢集四靈至千秋萬嵗皇圖昌題黄主事璿感螺詩巻璿四川人性孝謹年十二時祖母患煩渴思螺湯時嚴冬家人徧覓無所得璿乃戚然攜篚走南沖塘破氷探索得數十枚歸作湯奉祖母病遂愈人以為孝感所致為作感螺詩巻美之洪熙秋璿為戸部主事持以求詩為賦此蜀山突兀髙嵩衡蜀江浩𣺌連巴荆儲精毓秀産多士中有孝子璿其名方當齠齡家居日祖母遘疾乖天和參苓屢進莫一瘥荐加煩渴思田螺田螺自是泥中物僻沼荒池深汨没矧維冬冷盡蟄藏挾貝囊金何處鬻慈嚴戚戚璿心傷攜筐獨走南沖塘塘深水濶凍已合玻璃萬頃生寒光璿兮遽擲風前履踏碎水花蹴泥滓迥旋探索窮塘㘭忽有羣螺來觸趾且欣且拾登筠筐恍如坐獲千明璫持歸便促家人饌苾芬香味聞髙堂髙堂老母思正切一歠煩扄若開鐍百骸九竅生清涼二豎三蟲走顛蹷吁嗟如此豈偶然實由誠孝通于天天通故俾螺冬出螺出須令母疾痊孟宗乞笋號霜竹王祥求魚臥氷瀆二賢孝行誰與倫千載惟璿繼芳躅况璿蚤已窮經史射策金門拜天子只今列職民曹郎卓卓能聲在人耳願言自此加勉旃惟忠惟孝期兩全我雖老鈍不能為爾製佳什尚當拭目看爾雲路髙飛騫題頤菴胡祭酒先生玉笥白雲圖巻頤菴先生古君子德行文章當世美晨攜玉笥白雲圖訪我金臺官署裏自言先世多遺德卜居逺在金川側金川何處最清竒玉笥岧嶤插天極雲收萬朶芙蓉青雨餘百道銀潢傾隂巖月冷玉龍蟄陽坡春煖金牛耕蕭家峽口尤竒麗快若飛鵝舞空際泥江更抱伏虎形瓦橋重展遊虵勢祖宗體魄此地藏松楸桑梓森相望子孫奕奕藉餘䕃讀書食祿門庭光偶因海宇風塵迫遂向洪都問田宅緬懷玉笥不可親但見遥空雲白白雲飛白白其柰何先塋正在山之阿林烏泣雨下喬木野猿呌月懸春蘿矧惟宦轍方驅涉未暇栖栖理家牒聊憑縑素寄遐思用詔兒孫知祖業君其為我為歌詩大書圖尾君母辭他年倘遂懸車樂展圖一玩紓心思我聞此言聲欲咽復觀此圖腸欲熱水木本源人共知誰似先生孝心切願言移孝忠吾皇致時熙皥超虞唐白頭稽首謝丹闕清風一棹歸故鄉金川玉笥重登眺西山南浦閒耕釣此時此樂誰能如丘壠州閭總榮耀顧予薄劣無長才鄙詩不足開幽懷還君畫圖三歎息好風颯颯從天來題傅澤民分桂軒并序余曩與澤民同業于四明丹崖史先生之門先生嘗云昔唐太史奏月中桂子落天台後三百年當應至宋六飛南渡吾祖衍本初得紅木犀于山阿獻之髙宗植復古殿前仍製詩稱賞于是史氏以丹桂別他族今典教來湘泮池上復有桂一株是天副吾願望澤民得其意乃于此分一稚桂植書室前且曰先生之桂來自月中予之桂來自先生有所本矣因扁其書室曰分桂軒示不㤀所傳也永樂癸未夏澤民由水衡官擢監察御史暇日攜分桂軒詩巻索題予既知其由不敢以拙鈍拒遂摭其槩以塞責粤昔丹桂生蟾宮天香散漫飄穹窿世人仰望莫能折舉頭毎欲排天風後來仙子不自惜呵吒銀蟾鼓雲翼銜將桂子落天台要使人間共培植天台一種三百年鬼神隱䕶人莫傳史家先世積德厚得從此地更移遷當時不敢自娱賞持向金門獻君長龍顔一笑栽殿前更灑宸章為優奬宸章煥赫事實殊史家桂澤當何如敷榮發秀異他族流芳奕葉生名儒林林接踵為時起事業功名咸足美邇來復有紫崖翁碩德宏才古君子承恩典教來羅湘霏霏化雨菁莪芳祇緣遼𣺌丹崖逺心縣丹桂常徬徨徬徨未易乘風去日夕行吟泮池處彼蒼又若隂相之池上還存古桂樹色香雖匪丹崖濃根株却似丹崖豐丹崖桂澤裕厥後泮池桂澤將誰同芹邊弟子商崖裔重義崇仁心靡替稔知師意感師恩爰闢書軒分此桂吁嗟史翁何賢哉吁嗟傅君真竒才史翁之桂由祖植傅君之桂從師來書軒况爾數椽小桂樹分來相映好秋風吹破丹砂堆萬斛清芬散龍腦傅君傅君日對兹豈惟玩彼香色竒是宜篤志勵所業光前振後期如師清狂蹋雪尋梅叟辛苦移家看竹友縱情矯物徒自疲師友傳承事何有傅君傅君重勉旃如今正是秋清天及時吐華著芳譽相期史氏同綿綿桂林讀書處為賈郎中閔賦湘江山水何清淑孕毓斯人美如玉幽居瀟灑一物無環堵隂森盡嘉木既非陶門栁又非王家槐靈根産自廣寒窟老蟾銜出青雲來賈君先世好竒古掇芳栽向西風浦培壅灌溉期生成留作兒孫讀書所邇來樹老霜稜層枝頭開遍黄金英賈君觸物念遺澤寸心惓惓那能勝攜書遂入林間屋插架堆床千萬軸朝朝暮暮棲其中剔蠧翻芸苦心讀不圖珠玉富不羨鐘鼎榮但願瀾翻五車熟濟時載振箕裘名鶴書爭奈飛來早驚起鸞凰九天表南陽臥榻閒秋霄莘野耕犂罷春曉趨蹡碧玉殿出入黄金門囘觀往日讀書處紅塵漠漠遍蹄輪吁嗟丈夫在斯世出處行藏了難計况今正際清明時苜野安能老騏驥願言穩步青雲梯致君堯舜安黔黎功成解却朝天衣考槃再誦夫何遲題祝少卿西山暮景圖少卿卓犖人中英襟懷萬頃涵秋清夙承鶚薦典郡牧十年坐鎮滁陽城滁陽四面山如玉矗矗西山更竒獨根盤九地駭潛龍勢入層霄遏飛鶩少卿閲罷天閑駒簿書不撓公堂虛捲簾靜對西山坐夕陽正在山之隅紅光闇淡照巖谷翠色㝠濛覆林麓林邊散亂樵負薪巖畔縱横牧騎犢須臾牧去樵歌杳翠斂紅銷山靜悄鳥旋松頂待歸雲雲䕶松窩邀宿鳥吁嗟此景世豈多匡廬泰華徒嵳峩少卿遊宦此瞻眺桑榆觸目情如何我知少卿有髙致不學區區流俗計西山暮景雖時㸔報國丹心逾自勵况今正際雍熙日碩德耆英蒐用急少卿素行簡宸衷肯放長歌考槃什願言晩節多康寧致君堯舜安斯氓千年汗簡畱芳名西山亦爾增光榮送首德仁起復赴京首君自是人中傑襟宇澄清湛秋月妙齡肄業湘黌中入室升堂邁同列後來識我羅江邊論交耿耿金石堅一篝照雨夜連榻百壺載酒朝同船鶚書忽向雲間落鵬運三千莫能遏扶搖直上九重天受職姑蘇問民瘼下車纔擬施砭劑椿萱萬里哀音至滿城桃李無心栽衰絰歸來守親制寢苫枕塊甘毁瘠要竭衷情酬罔極流光苦恨不少遲倐爾星霜又三易悽悽忍把祥琴調起治行李趨天朝西風江栁正蕭索逺來別我恩波橋吁嗟此別休灑淚忠孝由來無二致誠能移孝忠於君若是尤為孝之備况今正際清明日四海車書混同一鸞鳳不出銜瑞圖翠竹猗猗為誰實酌君桑落贈君詩送君髙步黄金墀明年二月春風時我亦飛棹來京師與君重約鳳凰池青雲浩蕩長相期乙酉八月二日吳江館遇京友惠斗酒為小童所覆故人逺自天上來惠我一斗葡萄醅愛之不敢容易開呼童捧之當庭堦珊瑚擊碎紅泥堆珍珠迸入黄金杯一行轉我腸中雷再行掃我睂間埃三行四行愁壘摧五行六行春風囘桃花朶朶紅生腮臙脂㸃㸃香凝頦平原督郵走欲頽青州從事驚相倩客中有此真慰懷更無夢到糟丘臺柰何童子劣且騃推壺仆地如翻淮清光濕透爐邊灰餘香散入堦前苔為之恥兮徒有罍醉無成兮誰其陪是知飲啄皆天裁毫分有數非人媒毫分有數非人媒彼童子兮何尤哉觀打魚楚天空濶重雲幕孤館風寒倍蕭索著鞭江上觀打魚消遣愁懷樂其樂吁嗟打魚果何似彷彿昆明池上事漁官獨坐萬斛舟船尾載皷旗船頭揚旗擊皷一何勇漁子舟人皆聳動皷聲初發衆舟集皷聲再發提網急皷聲三發爭進取萬幅飛綸向空舉奔騰澎湃聲震驚浪花激作秋霜凝蛟龍避勢走欲仆河伯逃形懷戰懼千鱗萬尾無所之一網牢籠莫知數縱横巨細相倚疊山積沙頭如雪白漁人抖擻氣頗舒屈指團欒計千百均分各收受盪舟便囘首㫰網荻蘆邊鱠魚薦新酒酒酣更唱瀟湘歌兒童蟻聚聲相和且言今嵗儘餘裕輸官給役從如何我來對此情莫極更向漁人剖胸臆汝今得魚誠解憂割鬐臠肉還生不成湯既祝網魯叟亦不綱所以杜陵翁作歌為哀傷從今打魚休著眼莊惠濠梁樂無限送李主事暹奉使西域聖皇御極治化明海波不動邊塵清雕題椎髻盡入覲卉裳毳服咸來庭迢迢西域尤誠至職貢依時無或替聖心眷彼勤渠情特選才賢充報使地官主事闗中英年青貌偉襟懷宏往時兩度使絶域能聲妙譽人咸稱今來再乘皇華節曉駕輶軒行紫陌繡衣郁郁飄天香四牡騑騑拖錦紲暮春三月楊飛花此時準擬過流沙宣威不挂義陽劍通道寧藉張騫槎髙昌康居聊爾適鄯善月支蹔焉息星軺直駐于闐城天詔須頒大宛國大宛有馬皆龍駒于闐有玉皆璠璵皇恩遍布戎夷悅合辭入貢當何如黄琮蒼璧千金直騄駬驊驑五花飾想當旌斾言還時蕃使紛紛隨轍迹戎王祖道穹廬髙蠻兒旋舞翻葡萄笳聲吹落闗山月節旄振耀蟠花袍花袍不染流沙土文采曾霑天上雨歸來拂拭當彤墀百拜懽呼謁明主主心悅懌嘉忠勤隆隆恩寵應無倫願言努力重努力漢廷不負班將軍瑞雪詩并序欽惟皇帝御宇以來天地清寧雨暘時若民康物阜政肅化行誠雍熙太平之盛世也乃宣德己酉冬仲十一月正一陽之將復日丁乙卯上天同雲瑞雪隨降葢以彰來嵗豐稔之兆天道孚應聖心悅怡遂製歌詩昭示臣下仍錫以酒饌共樂清時臣等叨列班行躬覩盛事雖薄德謭才不足以贊揚休美然欣忭之餘不容自黙謹拜手稽首而獻詩曰仲冬十一月將半天氣沍結泉流斷六丁赫怒風姨顛驅叱黎雲集霄漢須臾萬里色一同㝠濛勃鬱仍丰葺天工乘此騁竒巧雕瓊削玉當長空長空迢迢四無接六出縱横舞睂睫乍㸔勢若蝶穿花靜聽聲猶蠶食葉郊原窈窕銀為橋江湖爛熳鉛塗艘隂崖皎皎失苔蘚古樹茁茁生芒硝又疑何人燖鵠鷺氄毳飛來莫知數亦疑仙子開瓊樓淨掃瑶塵灑雲路况當午夜清明時影揺六合光離離梅邊老鶴驚且唳桂根玉兎窺還疑是知此景非徒致實本吾皇隆聖治吾皇聖治符天心故感如斯豐稔瑞年豐嵗稔邦家寧吾皇端拱唐虞廷覃恩布澤及遐邇制禮作樂昭昇平小臣何幸生斯世端笏垂紳列丹陛雖無往哲賡歌才敢忘封人三祝意封人三祝何為言願君壽福咸齊天輿圖廣大磐石固神孫聖子傳綿綿題攸縣曾榮宗夢雲圖麟峰峭拔撐青旻峰頭縹緲多白雲有人結屋在其下讀書樂道期娛親一朝薦達登膴仕逺别慈闈千萬里朝朝暮暮不能㤀企仰雲峰痛心髓痛心遂爾勞夢魂飛揚忽與雲相親飄飄逺至慈闈下歡欣拜舞娱親身吁嗟雲兮本虛物磅礴輪囷多變復思親孝子今夢之無乃人心與雲觸雲無心有舒巻人有心無近逺無心有心一夢中孝感誰云不昭顯君不見狄梁公太行當日情何濃彼雲在望子在夢寥寥千載還同風顧予薄劣亦人子堂上萱親髮銀似如今逺作宦遊人感此中情寧有已惟慮忠孝難兩全養親弗若榮親賢願君步武青雲上白雲雖逺終得與子相周旋題蕭司務鼎和八葉流芳圖廬陵蕭氏何其昌派從江左分來長繩繩繼繼引勿替貴聮八葉興于唐唐廷峩峩天宇靜八貴相承秉鈞柄簮纓赫奕充門閭聲譽芬芳藹觀聽祇慚我輩生太遲不見渠家全盛時寥寥仰止千載下據圖拭目㸔孫枝孫枝挺特真英器此日牛刀姑小試㑹當步武廊廟中煜煜金章耀環珮耀環珮伊誰侔立功樹業光前修更須種德如山丘綿綿萬葉傳無休戲贈淨慈寺僧恬靜巻我從前日辭蓬萊飄飄飛上姑蘇臺臺前桂魄照秋水一碧萬頃無纎埃喜來遂發㸔山興擬度錢塘覽竒勝片帆若為天風畱一上雲居聽鐘磬雲居瀟灑雲飛飛中峰去後𣺌莫追就中忽遇老禪客自云近日來淨慈睂峰修修散晴雪性海澄澄湛秋月煮茶揮麈共我談四座霏霏飛玉屑我觀此僧不是尋常僧樷林當代應馳名何當攜取廬嶽去相尋修靜重締盟坐㸔五老香爐青題吳敬安竹軒湘江之曲湘山隩地曰東橋甚多竹低昂修短各有倫郁郁猗猗勝淇澳葉交加兮鸞鳳搏根鈎曲兮龍蛇蟠清聲振兮寒玉碎綠隂藹兮晴雲團吳公藉藉延陵族雅量雄襟邁流俗對兹戀戀不能違遂向林間結茅屋數椽不隘亦不華竹軒扁額尤為嘉雨餘空翠入簾濕月明虚白穿窻斜有時絃琴竹下鼓琴聲竹韻同清古有時攜茶竹下烹茶烟竹霧相吞吐東籬徒訝黄花瘦孤山浪説寒梅癯河陽滿縣盡花樹成都連畝惟桑株何如吳公對此竹抱直含貞絶塵欲七賢凜凜同髙風六逸寥寥繼芳躅彼蒼獨恨難夤緣平安初報人已仙空堦寂寞下寒露幽篁蕭瑟揺蒼烟賢郎感慕心如燬九原深邈人難起臨軒躑躅聽竹聲謦欬分明猶在耳願言篤志窮遺經惟忠惟孝毋偏輕他年雲路髙飛騰竹軒亦爾增光榮題慈雲海上人泉石軒我嘗駕鶴遊蓬山顛崖絶璧窮躋攀濯纓靈泉啖玉髓振褐瑶石收金丹別來倐忽厯年嵗泉石膏肓無妙劑又從淮海逾錢塘要㸔溪山豁胸次越中忽遇慈上人號稱雲海超常倫搆軒數楹傍巖谷清泉竒石皆天真有時挹泉洗禪足活活泉聲潄涼玉有時掃石移禪牀綫綫苔痕皺晴綠銀蟾夜浴清輝生上人皎皎禪心凝碧雲曉出白衣澹上人冉冉禪身輕此泉豈與貪泉比此石尤非釣石儗泠泠不入許由瓢鑿鑿難為孫楚齒汲來竹底烹龍團白花浮光六月寒琢之松窻陪兔穎𤣥圭弄影三峯攒廬山一派飛千丈窅𣺌誰能日相向虎丘一片容千人蕭索何由坐其上是知上人居此軒清泉竒石常在前石能雲兮泉能雨上人清號寧虚傳我將乘風周八極未許長年坐此看泉石願言沛爾雲海之慈波潤及天下均饒益題湘山樵寓湘人蕭規少遊吳中值亂不能歸遂家于彼今年踰八十有懷故鄉扁所居曰湘山樵寓聞予為鄉人扶杖來謁因求詩遂為賦此扁舟當夏來姑蘇寥寥萍水交游疎有翁老大相過訪桃花染顔霜染鬚謂是非熊叟不釣磻溪魚謂是空桑子不把莘野鋤煮茶延坐問所以乃云我是幽潛徒本來生長湘江側詩禮傳家有遺則早年酷厭流俗羣遂入湘山作樵客清泉白石學礪斤殘樗朽櫟聊充薪風時一笛弄寒月日暮片席眠晴雲㑹稽太守了弗羨少室山人尤所賤此身只與溪山親養素含貞畢初願柰何陵谷忽變遷弱蓬不為狂飈憐東飄西泊失故所栖栖畱滯吳城邊吳城嵯峨烟霧塞一住多年歸未得囘觀往日樵游林桑梓迢迢天宇隔天宇隔情瞿瞿海籌滿屋頭毛枯望雲長羨飛鳥逝臨流深念遊魚徂聞君亦是湘中士故爾相從話行止君能為我冩幽情庶免他年愧鄉里吁嗟翁兮胡爾言人生出處非偶然吳湘萬里雖異地吳湘一日還同天翁不見古豪傑掉臂常嫌穹壤窄倦來到處即為家那問青齊與吳越况翁舊作湘山樵心閒志逸身逍遥如今終老東吳地清風亹亹誰能髙願翁永誦考槃什飛鳥游魚毋念及唐虞在上時雍熙㑹見褒書下州邑題練溪草堂練溪之地何髙明練溪之水何清澄幽人架屋臨溪塍甕為牖兮樗為楹片簾髙捲香風輕山禽水鳥從飛鳴有時客至忻然迎呼童便覓牀頭瓶瓶中有酒甘如餳溪中有魚肥可烹取魚酌酒舒幽情醉來那顧身欹傾日西客散柴扉扄竹牀移近梅花屏恬然一夢無人驚梁園金谷何足稱祗緣聖主思治平禮羅四設蒐賢英如君倜儻年尤青草堂豈得淹平生願言控翮髙飛騰嘉謨嘉議為時呈致君端拱唐虞廷歸來再與溪山盟歸來再與溪山盟庶幾出處全令名題南溟息上人聽松軒大雅久不作鈞天寂無音繁聲急響徒亂耳涼風古意誰存心南溟道人獨爾得真趣掃却哇滛拂塵慮縳茅直向吳山巔繞屋森森種松樹天風時自天際來松聲畢發真竒哉清如寥寥老鶴唳碧落驚如怱怱萬馬奔黄埃又如瑤臺三千仙子朝帝闕環珮珊珊步明月瓊林十八學士登瀛洲軒葢翩翩振金節南溟此際誰與俱鉤簾宴坐心于于聲來在松聽在我我心還似松聲虚不抱焦尾琴不弄柯亭竹惟聽髯龍吟嵗寒更竒獨愧予走俗走未休耳邊安得辭諠啾南溟南溟為我畱半榻尚期後日重來遊烏夜啼慈烏啞啞清夜啼飛來飛去無枝棲天空月冷聲慘切更深夜永情悲悽東家織婦年三五良人萬里操干櫓冬衣未寄春復臨機杼勞勞不勝苦耳邊忽聽慈烏聲炎炎萬感焚中扄掀襟抆淚罷機杼披簾促步趨前庭悲悲咽咽對烏説莫向清宵學啼血妾夫別去三踰年魚鴈迢迢至今絶願烏將妾相思情西飛啼向夫郎聽夫能聽兮妾情達妾情達兮夫心寧夫寧豈欲終㤀返恩義須期兩無赧夫能努力樹功名白髮歸來未為晩題雲居先生遺像神仙中人雲居翁秀氣原自仙華鍾蚤年即逺簪纓樷僑居靜挹林泉風羣書諸子既折衷内經脈訣尤研窮活人要濟岐黄功不容二豎欺疲癃柰何晩厭人間蹤乘風頓返蓬萊宮寄兹清影尺素中睂疎目朗雙頰紅飄飄獨步誰能同商山舊有東園公我來相對語莫通舉頭悵望仙華峯舉頭悵望仙華峯雲深不見青芙蓉題所翁龍所翁所翁何多能毫端幻出真龍形杈枒雙角斵𤣥玉爛熳兩目揺金星我初見此昂藏勢未識騰衝霄漢意摩挲老眼再四觀漸覺蜿蜒有生氣緬想揮毫欲畫時所翁應與龍相隨不然何以極此妙令人不敢臨淵窺願言珍黙全神化莫學金陵空叱咤吾農嵗計在夏秋此時望爾為霖澤天下和胡祭酒雨中獨坐詩韻連朝風雨泥濘深幽人不見心沈沈想應齋居有餘暇坐披巻籍窮古今過眼瀾翻五車熟却喜牀頭新酒綠開樽勸飲是何人好似顔家小銀鹿顔魯公家童名銀鹿載歌載酌三杯餘新詩百首皆親書封題寄我意何厚恍如十二珊瑚株欣然便欲馳車馬走送詩壇共誇詫出門未定復入門無柰長空雨飛灑舟行值雨江風浩浩吹江栁碧流如㵼翻瓊玖扁舟一葉勢欲飛兩岸青山入雲走雨聲滴滴敲篷鳴我居篷底誰為情呼童洗盞酌新酒自歌自酌攻愁城愁城既破我亦醉謾擁輕衾欹枕睡夢囘拭目推篷看烟水茫茫不知處小江漁釣小江江水綠如酒兩岸春風舞垂栁老漁落魄一事無三尺綸竿長在手有時釣得縮項鯿隨緣沽酒供餘年不圖星辰動天闕醉來即藉羊裘眠汨羅懷古五月五日天氣晴古羅士庶思屈平聲金伐鼓集畫艦浩歌競渡招沈靈沈靈不返知何往楚國蕭蕭空草莽聊將一滴菖蒲漿灑向清波寄遐想桃花灘桃花灘上桃花開桃花灘水鳴春雷扁舟欲上不能上牽繵百丈何艱哉烝徒努力重努力不比尋常浪花激老夫設險有如斯過此揺揺隨所適福祿曉鐘四鄰膠膠雞亂鳴樷林衲子聲寒鯨載遲載促一百八松雲墮碧星河傾吁嗟人生能幾永在世無殊幻泡影悵然聽此不能眠起坐幽窻發深省忠靖集巻三
