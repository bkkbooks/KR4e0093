body:
  text: 忠靖集卷五明夏原吉撰七言律詩瑞并序丁酉冬陜西民獲瑞其色純黑如墨金睛鋭耳馴馴無驚態獻于朝上甚悅賜羣臣觀因命賦詩以進儲精月殿幾何年今换新粧下九天玄毳霏霏煤雨潤黔姿閃閃墨雲鮮眠尋雪窟身難隱行傍梅花色更妍似此真為清世瑞可無詩獻玉階前宣德己酉夏四月二十四日早朝應制二首月色朣朣玉漏停九天閶闔悉開扄雲扶六馭來黃道花覆千官列紫庭清蹕乍鳴諸殿肅衮衣端拱萬方寧小臣何幸承殊渥簪紱優遊及暮齡二聖主龍飛宰八區視朝常在五更初煌煌燭影輝金闕裊裊香煙布玉除仙掌每隨東旭轉鑾旗時為曉風舒日髙班捲夔龍出黃閣從容閲奏書和胡祭酒索黃精詩二首却穢通神更養生黃精端不讓青精蘿崖曉斸雲連鍤竹砌宵蒸月滿鐺服久豈徒躋壽域身輕還許到蓬瀛殷勤持向頤菴獻祭酒號頤菴少助清筵骨董羮二萬里瓶封寄草庭瑩然琥珀色微赬靈根信是陽精結香味真緣戊土生資養丹臺三景泰掃除白髮一身輕獨慚分獻鱣堂晚重辱珠璣墮月明寄謝友人惠冬笋帶雪抽來犢角長筠筐封惠自瀟湘錦綳乍剝稜稜瘦玉板輕批片片香孝子不勞林下覓老親深喜客中嘗明年此際應仍有還肯相思寄逺方和劉給事中韻文雅風流世莫雙黑頭承薦入明堂記言花露濡霜管退食天香襲繡裳北斗喜瞻嗟嵗晚陽春欲和愧才荒願攄忠藎裨清化伯仲同垂竹帛光和胡祭酒雨後見示詩韻雨腳初收日色生眼前景物一何清亭亭髙樹張雲幄秩秩疏篁響鳳笙牛女如期天上會蛬螿應候耳邊鳴官居獨宿洪崖客莫動西風張翰情送員外郎陸仲英之閩憲副蘭署聮鑣已六秋今當分袂赴閩州葡萄滿酌氷花冽獬豸新簪霜氣浮萬里驄聲衝雪去三關民瘼望風瘳計程應向武夷過煩問山人安樂不贈祝仲山滁陽省父還番陽偉哉太僕起名儒一住琅琊十載餘苜蓿雨肥晨考牧梧桐月白夜觀書達尊三備人咸羡好句多吟我不如珍重問安賢孝子古來毋惜道途迂思親旅食金臺已嵗餘髙堂白髮近何如清晨應共婦占鵲薄暮還同孫倚閭衣服縫來針密密音書寄到意劬劬此身若有雙飛翼日日還家問起居送春官侍郎儀公致仕歸山東偉矣南宮老亞卿十年鳴珮玉階行經綸國事心惟切輔導皇儲志益精景迫桑榆還故里恩霑雨露出都城寥寥疏傅榮歸後誰似先生播令名送大理寺丞孫習之疾愈回南京聖主仁明慎五刑伏伽重起作廷平讀書讀律謀猷富無黨無偏讞議精抱疾經時淹北邸承恩此日去南京願言更廣平友政勿使于張獨擅名送國子助教黃君立致仕歸閩太學橫經已有年聖恩今日許歸田三山耆舊迎疏廣六館英髦仰鄭玄舟發天邊無一物詩傳海內有千篇如斯出處真髙潔慚愧吾儕後著鞭送鄉友監察御史彭希益還家省墓異鄉久抱故鄉思况復臨岐送故知鸚鵡忍傾桑落酒玲瓏愁唱竹枝詞想當薊北霜飛處正是江南人到時煩語芹邊諸俊彥尚書今已鬢成絲送尚寶司丞葛貞還姑孰省墓幾年瑣闥侍宸旒風木長懸萬里愁忽喜綸音下閶闔便尋蘭棹覲松楸羣公畢餞金臺曉故老歡迎采石秋安得此身同此志束書也駕洞庭舟送冬官尚書黃公歸山東省墓二首青嵗登庸侍冕旒白頭歸去覲松楸袂分冀北氷初凍車駐萊陽柳正柔壯志肯緣鄉土滯此心長抱國民憂虞廷絃奏南風調擬聽鳴珂謁鳳樓二京國交遊已有時春風偶動故園思三杯燕市開懷酒幾句都門送别詩海上仙人休問訊山東民瘼好諏咨先塋省罷還朝日端笏從容奏主知送教諭李素改除浙江就祿養親羅湘振鐸十餘年今又攜書上浙船梅玉一枝天上贈蒲帆半幅月中懸好披彩服同萊子莫訝寒氊老鄭虔他日彤廷重考績春風臺閣擬超遷贈僧南宗歸錢塘詩并序永樂初豫奉命理水吳中時南宗上人攜看松樓詩卷謁豫索題冗迫中嘗為綴數語於卷末逮今餘二十年偶會于燕山寓館話舊未悉又復告歸蹤迹萍蓬良用悵惘行矣無贈姑緝五十六字歌以送之二十年前浙水遊題詩曾上看松樓四簷風月清人骨萬里雲煙駐筆頭宦轍祇慙同泛梗塵心徒切仰虛舟如今又向燕山别舊日松樓詩在不贈李真翁八閩髙士老聃孫結屋蕭蕭近水濆心逺更無金馬夢身間常對白鷗羣黃庭夜讀窗留月緑綺朝絃榻駐雲何日移家傍翁舍細聆清論滌餘氛過衢州次吳中書韻使艖才擬過三衢咫尺常山又駕車流水有聲浮舴艋好山無數插芙蕖身輕不憚行程逺才薄惟慙厯仕初珍重同來賢內翰嘉言毋惜話前途次芊源驛舟次芊源日已西箇中風景敻清竒潮聲洶湧通閩海山勢逶迤接武夷茉莉摘來香噴鼻蠣房買到味如飴翩翩上下皇華客肯駐雲帆共賦詩海上次吳中書韻總角常思海上遊乘風今日得周流一泓夜浴驪珠火五色朝浮蜃氣樓遼水只今無鶴語蓬壺千古戴鼇頭寄言漢使張公子肯借靈槎犯斗牛次吳中書見示張真人所贈詩就步韻奉還偉哉江右老儒宗講帳曾看設絳紅內史詩才存古意天師書法冠時雄寒氊懶坐清江雪雲錦新裁翰苑風我欲踏花登鳳沼陽春一曲愧難同次金澤頤浩寺僧中宅衡韻二首每愧無才位六卿觀風今出鳳凰城錦帆載月臨金澤寶剎披雲駐玉旌樓閣巍峩同上竺江山清古擬南衡何當了却公家事來共髙僧話月明二十載叨居治世卿公遊偶寓梵王城法華流響清塵耳薝蔔生香襲使旌苔石碑文迷嵗月雲封星藏閟璣衡誰能為我邀船子問訊當年雪竇明次前韻贈化城寺僧謙隱五首久聞聲譽動時卿今喜相親在化城風暖茶煙生几席月涼花露濕幡旌松關晝掩猿依榻竹輦晨遊鶴駕衡貝葉有時看未了小窗清夜爇松明二不羡人間冷暖卿清修逺傍闔閭城禪衣穩勝三加服錫杖殊輕五仭旌煙岫以時開畫障風鈴入夜響璁衡祇慚我為塵緣擾顛倒三生夢未明三朱門無意候公卿自喜幽棲逺市城雙屐登山舒眼界一盂溪澗滌心旌詩囊貯玉鳴吳楚談麈生風撼泰衡况有空王遺録在定餘時玩小窗明四簪笏庸庸位列卿每慙時議鄙陽城暫辭天上尚書省來秉人間使者旌治水無能追聖禹窮經徒自慕匡衡篇詩寄贈凝禪子肯把真機為發明五獻賦當年説長卿至今名重錦官城我生謾負三遷教事業都無寸可旌畫舫當春行震笠白雲終日望湘衡何時得似禪林客襟宇澄澄萬境明宿湖州慈感寺和壁間詩韻借榻苕溪慈感寺始知城市有山林蕭蕭白髮窗前老漠漠紅塵門外深貝葉曉翻龍側耳珠光夜吐蚌傾心道人相對莫相笑聊灑松煙記重尋崑山崑阜遙看小一拳登臨渾似接青天神鍾二陸人才俊氣壓三吳地位偏巖溜下通僧舍井林霏近雜市廬煙何時重著遊山屐來訪當年種玉仙舟泊華亭述懷官航昨夜泊華亭譙鼓逄逄正四更明月樓頭人語靜西風江上客懷驚蕭何事業光前代韓子文章法後生顧我疏庸何所補謾隨沙鳥日營營次韻答虎石道人三首幾向天邊仰德星邇來相見正秋清飽諳法海無窮理不數宗門第一名獅座曉登花有影虎溪夜渡水無聲何時分我雲間榻燒燭烹茶盡此情二為愛叢林老辨才片帆歸去又還來囊中珠玉清人骨塵尾風雲障俗埃蓮社未知容我否酒睂且自向師開三吳早晚徵輸足重看天花雨法臺三每夜鈎簾起看星六符耿耿泰階平道人何獨耽風月不我相羣攫利名琢句春生池草夢翻經時動海潮生間忙有分知誰並慚愧無依記别情次俞都御史韻與虎石道人二首紛紛車馬走黃埃此地誰能日日來獨有豸冠因酒病時尋虎石扣門開山中風月初相識江上煙波又促回今我登臨亦何興謾看猿鶴舞徘徊二道人淨掃上方埃瀹茗焚香待我來風舞葛巾荷已老露凝金􅊦菊初開心淹公事偷間坐話到真機忘却回戍角一聲催上馬滿階清影月徘徊登吳興道場山肩輿一上道場山遊覽都忘陟頓艱泉迸石渠存虎迹峯名金蓋擁螺鬟木魚催飯鳴松杪野鶴窺窠過竹間安得從今脫塵鞅此中相伴老僧間重遊嘉禾天寧寺前日曾留堅密軒煮茶話舊夜無眠此來重訪山中容再説三生石上緣白鶴刷翎苔點雪蒼麋礪角竹分煙何由頓謝塵紛事也買蒲團學坐禪虎丘懷古我從山水窟中來此地登臨獨愴哉葬劍人亡池自碧題詩鬼去石還埃蒲牢呌月新修寺麋鹿鳴風舊染臺誰似當時蘇與白畫船簫鼓日追陪過吳江泗州寺訪僧留宿行盡吳江興尚濃却從寺裏訪瑄公未論石上三生約且喜山中一宿同詩句新題蕉葉雨茶香熟送藕花風明當百八蒲牢吼重整雲帆向五茸至日述懷簡袁少卿趙御醫去年冬至身為客今嵗逢冬仍未歸拜闕班聮吳子國還家夢繞老萊衣塵蹤似梗何時定心緒如麻竟日違珍重同行袁與趙一尊好共酌斜暉題方尚書萬竿煙雨圖琅玕碧鎖何糢糊煙雨滿林秋日晡龍潛九地噴靈靄鳳入層霄銜瑞圖清瑟泠泠鼓湘水翠華隱隱飄蒼梧雲煙一幅醒我夢二女祠前聽鷓鴣題太僕吳寺丞皆山軒幽軒小小勢翻翻夭矯雲巒四面環青擁佛頭朝雨後翠排仙掌夕陽間詩因景好偏多賦琴為心間不厭彈可笑當年謝安石謾攜紅袖走東山題都御史所藏錢舜舉山水霽翁山水舊馳名此卷今看筆更精一瀑漏巖飛雪練數峯當户列雲屏杖藜僧入松間寺䇿騎人過柳外亭佳境如斯在何處扁舟便欲訪蓬瀛題楊太僕所藏子昻畫春牧圖我愛吳興松雪翁胸蟠百萬渥窪龍丹青邂逅揮窗底牝牡分明見眼中逸態雄姿皆汗血髙蹄促腕盡追風何當駕此三千匹踏碎邊塵報九重題楊學士萬木圖有序勉仁大夫達卿公曩居建安龍津值嵗歉飢殍盈道公欲發私廩賑之慮近名乃託以募民種木給粟酬直於是貧者踵至受粟而樹之種否並不較鄉人賴以存活時有為萬木圖以美之者公逝矣勉仁以圖示豫索題嘉歎之餘賦此復之道殍纍纍嵗大祲達翁周恤意何深指山託種千株木發廩全傾萬斛金建水一時回菜色龍津終古藹棠隂區區射利沽名者俯仰斯圖不愧心題寶敬齋并序為張真人壻樵陽上官用禎作用禎有書齋真人為題其額曰寶敬攜至京求詩因賦此寶敬齋名莫浪評操存涵養在躬行荒寧怠惰功斯墜惕厲齋莊業乃成朱子一針千載重丹書十字萬金輕賢哉甥館清修客仰止能忘西璧情題常執中尚絅卷三十年前共讀書已知君志與人殊詩歌尚絅明深意賦鄙雕蟲學古儒德業淵淵中自積才華蔚蔚外如愚只今從政多嘉績尤見躬行心得餘題主事張鉞登雲軒偉哉南國登雲士志氣如雲孰與同五色日邊頻獻瑞九重天上早從龍不誇蒼狗斯須態肯眩竒峰頃刻容潤物以時施惠澤直令四海仰豐功題宋進士袁天與忠節傳後有序四明袁天與宋咸淳中進士未有官守言責值德祐難作為趙謝二友所賣遂奮身抗敵為敵所擒以火燎之罵不絶口而死家人男女十七口聞之同時赴溺惟一孤為沈朱二僕救免闔門忠義若此誠古昔罕見惜其事遭姦人所抑史竟泯而弗書厯百餘年四世孫太常丞廷玉慨念先德始誄以述之仍假丹臺外史蔣景髙傳其實太常子尚寶少卿忠徹復于當代縉紳大夫士作為詩文集成一巨編將以垂示永久因命豫題其後嗚呼殺身成仁舍生取義志士仁人事也天與能行志士仁人之事孤忠大節耿耿貫天日天不沒人之善君子樂道人之善而其潛德幽光寧能終泯耶故始雖晦而其後益彰殆與天壤同一悠久矣然則向之賣友辱身挾怨抑善者既死之誅果能逭否乎豫不能文姑賦詩一章復之仍托此附于卷末常山髙轍久湮蕪之子寥寥踵後途九竅入煙猶罵敵一門赴水只存孤沈朱效義真良僕趙謝偷生豈丈夫誰秉當時修纂筆竟遺忠節快姦諛題樂善堂二首休笑南陽諸葛廬莫嗟西蜀子雲居寸心為善行無倦尺地棲身樂有餘甕裏况存招客酒牀頭仍貯教兒書間來持此消長日何用區區較毁譽二綵舟南泝路何長過盡瞿塘是故鄉兩岸柳風催去棹一天梅雨迓歸檣好將吏部新書扁髙挂君家舊築堂他日歸來重相見熙熙人物共輝煌禁繫省咎與傅生端笏龍墀三十年心持氷蘗日乾乾寧知卞玉青蠅汚猶幸秦臺寶鏡懸夜枕悠悠萱草夢晴窗耿耿鶺鴒篇天門何日金雞出鵬翼重看萬里騫挽少師姚公廣孝三首早負經綸濟世才翩然杖錫謁金臺孔明原自隆中起仲晦都傳薊北來翊贊聖明清宇宙吹噓賢俊出塵埃功成特拜三孤命烈烈聲光際上台二七十之年自古稀多公睂壽接期頤童顔鶴髮神仙侶玉帶朱衣太子師報國有心頻獻策退朝無事只哦詩如今乘化逍遙去玄塔風生草樹悲三昔年奉命賑東吳懷抱相親過友于月下詩成頻屬和花前酒盡更令沽劍池訪古肩輿並笠澤尋幽畫舫俱回首舊遊今已矣憶公空有淚如珠挽王主事希範正喜南官秩任榮俄驚天上玉樓成逍遙一笑騎鯨去寂寞何年化鶴鳴聖主恩深歸旅櫬嚴尊淚盡哭銘旌懸知瘞玉錢塘麓潮咽無聲江自橫挽馮筠窗先生早悟易中玄用舍行藏總付天架上青編時教子牀頭緑蟻日招賢俄驚半夜舟移壑遽逐層霄鶴化仙宰木蕭蕭風露冷山陽笛調謾悽然挽曾秬憶昔垂髫見我初英英氣宇陋童烏誰知白玉樓徵記遽使丹山鳳失雛訃入庭闈深慨惜詩傳朝野共嗟吁何由髙擘匡廬石為勒遺文立墓隅過尚書嚴公墓有懷昔年曾共立彤墀鶴髮虬髯動主知豈謂初辭天府政駕言長赴夜臺期鬱蔥佳地藏簪笏窈窕豐碑刻嵗時愧我客邊無藻薦倚風酸鼻為吟詩登黃鶴樓黃鶴髙樓郡城外黃鶴去後曾來不江山萬古復萬古草木一秋仍一秋崔皓有詩人少和仲宣無事何多憂呼童攜我船內酒來此邀取仙人謳題翠微書舍可人書屋翠微中景趣鵝湖嶽麓同風引溪雲侵几濕月將松影入簾重十年坐閲藝邊蠧一舉髙攀天上龍珍重山靈莫相憶白頭歸眺更從容題雪軒溧水先生海內英一軒白白雪為名夜窗月照梅無影曉檻風生鶴有聲清素真為君子宅虛明尤稱主人情何當載酒攜松竹來結軒中嵗晚盟題鄉人何養素鶺鴒圖嚶嚶黃鳥自求朋友愛安能比鶺鴒點尾搖頭知有急飄聲隨影豈無情信知結袂交遊誼未若彎弓涕泣誠珍重何郎知此意畫圖莫作等間評題雲林清隱縹眇堆深萬木低幽人此地學棲遲滿簾虛白月生處一榻空青雨過時酒熟每招麋鹿友身間肯羡鳳凰池爐香靜課佛書罷細看輪囷變態竒題道士凌虛樓道人樂道厭喧啾直倚層空架此樓萬頃風雲生榻底一天星斗布簷頭黃庭夜數犀珠讀玄圃時憑鶴背遊安得我身無俗事也來箇裏學清修和僧白鷴詩二首雙頰彤彤點絳紗滿身霜拂更光華栖來晚樹煙籠葉呌落春山雨濕花曾逐繡衣朝帝闕偶隨珠句到禪家主人料得相看好不用昂頭羡野霞二醉塗玄鶴頂丹砂間住山中幾嵗華虞網忽迷三面雨樊籠身掩一身花永懷五柳先生宅靜憶孤山處士家若向風前輕脫鑰髙張雲翼趂飛霞七言排律應制賦瑞應玄詩并序臣聞聖人有大德則克膺天眷以統主神人故上天昭鑒敷錫景貺以兆國家萬萬年洪盛之慶欽惟皇上以聰明睿智之資纘承丕緒統御華夷簡賢任能勉圖治理覃敷德化輯安萬方故雨暘時若年穀屢登諸物之祥軿臻沓至比者寧夏守臣連以瑞來進不褐不蒼而毛質郁郁然若玄雲黑玉純潔明瑩誠希世之竒珍太平之嘉瑞蓋上天以彰我皇上之至仁大德以隆我國家福祚之悠久而為四海蒼生之大慶也臣叨列朝班躬覩盛事不敢自默謹拜手稽首而獻詩曰聖皇御宇萬方寧和氣沖融品物亨列宿儲精生瑞守臣馳牘貢神京露滋黭黮玄雲濕日映晶熒黑玉明行傍緇帷人莫見立當瑶砌鶴先驚渴來淨吸龍池水飢後時餐御苑蘋赫赫四靈端可並紛紛六擾豈能并祇慚賤質無才學叨列清班荷寵榮惕惕深懷天地德兢兢莫致草茅誠今逢藩閫呈嘉瑞敢靳微言頌太平百拜金門陳短什詠歌聊以效嵩鳴忠靖集卷五
