body:
  text: 忠靖集巻一明夏原吉撰表進太祖髙皇帝實錄表監修官戸部尚書臣夏原吉總裁官翰林院學士兼右春坊右庶子臣楊榮國子監祭酒兼翰林院侍講臣胡儼纂修官翰林院學士兼右春坊右諭德臣金幼孜翰林院學士兼左春坊左諭德臣楊士竒翰林院侍講學士臣曾棨翰林院侍讀兼右春坊右贊善臣梁潛翰林院侍講兼左春坊左中允臣鄒緝翰林院侍講臣王英修撰臣余鼎臣羅汝敬刑部主事臣李時勉臣陳敬宗等欽奉聖㫖修纂大明太祖聖神文武欽明啟運俊德成功統天大孝髙皇帝實錄欽依修完謹奉表上進者臣夏原吉等誠惶誠恐稽首頓首上言伏以聖人啟運肇萬世之鴻基國史纂書示百王之大法必憑紀錄垂法後來故典謨載堯舜之言方冊布文武之政古今通義昭晰如斯矧創業垂統而茂建於豐功又繼天立極以聿隆乎至治欲揚休美謹在編修欽惟太祖聖神文武欽明啟運俊德成功統天大孝髙皇帝天地合德日月同明膺景命而隆興握貞符而御厯義旗一舉豪傑景從仁聞四張州郡響應遂渡江而下姑孰乃定鼎而都金陵除舊布新安民靖亂風霆肅乎號令日星煥乎紀綱威武奮揚東面征而西面怨至仁不殺近者悦而逺者來掃羣雄於呼吸之間拓四方於指顧之頃連城納欵挈壺漿以迎師列土歸降崩厥角以稽首舉中原如拾芥蕩外㓂若振枯拯烝庶于塗炭之中驅羣雄于沙漠之外不十年而成帝業混一統而主天民人紀肇修叙彞倫于既斁華風復正舉禮樂于重興山川鬼神莫不攸寧華夏蠻貊罔不率俾有過化存神之妙盡彌綸參贊之功身致太平卓冠百王之盛德兼文武超越六籍之聞况儉勤戒乎始終而謙敬純乎表裏宵衣旰食日總覽于萬幾秋肅春温時順體于四序是致雨暘時若嵗穀屢登諸福畢臻天休滋至在位厯三十餘年之久升遐動萬方哀悼之心自古以來未有如斯之盛者也恭惟孝慈昭憲至仁文德承天順聖髙皇后天生聖善克相肇基誕開文定之祥永協坤元之吉同符景運遂位中宮德邁嬪虞功超胥宇性情適闗雎之正子孫應麟趾之仁簡能造化之宜保合承天之慶政修宮閫化行家邦誕育聖躬茂承天眷自古后妃之隆莫盛于斯者也欽惟皇帝陛下聖仁天賦睿德日新念達孝以尊親在繼志而述事聿頒修史之詔適當嗣位之初發蘭臺記註之文而徵以藩邸之副抽金匱石室之祕而考乎世家之藏爰纂錄以成書實仰賴于聖斷謂事貴直而文貴簡理必明而義必彰乃勅命乎儒臣重編劘于嵗月臣等才非良史媿乏三長法遵舊章敢妄一筆惟洪鈞何能于繪畫而至德莫罄于名言煥乎文章表經世之大訓寫之琬琰作貽謀之永圖謹撰述太祖聖神文武欽明啟運俊德成功統天大孝髙皇帝實錄二百五十七巻計二百五十冊寶訓十五巻計十五冊謹伏闕上進臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞永樂十六年五月初一日監修官戸部尚書臣夏原吉等謹上表頌河清并序永樂二年冬十二月十七日至永樂三年春正月十八日黄河水清凡數百里於是秦王及髙平王相繼奉表稱賀上謙讓弗居羣臣固請咸謂不可不承天心以虛靈貺遂俯徇輿情受賀于奉天殿慶協神人歡騰朝野猗歟盛哉誠亘古以來非常之竒遇也臣伏念自古王者政平地出醴泉聖人在位海不揚波禎祥所見必有非偶然者矧今皇上以天縱聖神削平内難簡賢命良省刑薄賦恩覃乎逺邇德被乎蟲魚至和氤氲充滿無間由是嘉禾生仁獸至野蠒成神龜出然猶未足以擅厥美迺至黄河水清綿亘數百里豈非天意欲以彰皇上之潔白一心澄清九有内體乾德外著陽剛故特以此而為休徵之應哉是葢不獨為皇上一身之慶而且為華夏億兆民之慶不獨為朝廷今日之祥而且為宗社千萬世之祥矣臣原吉忝綴六卿獲瞻盛事雖匪才淺學莫克稱揚然忻忭之餘不容自黙謹拜手稽首而獻頌曰於皇太祖孔神孔武受命自天奄有下土綱陳紀立禮備樂明熙熙皥皥民樂太平龍馭上征作賓于帝羣姦肆欺搆難生厲穆穆我皇應天順人嗣承寶厯大命維新迺揚聖謨迺闡舊制億兆歸心蠻夷奉贄餘祲屏息至和誕敷天錫靈貺用作真符既有嘉禾復有仁獸野蠒神龜迭見先後所發未艾黄河載清亘數百里湛徹虚明華彩畢呈光輝交煥澡浴日星涵濡雲漢無汚不滌無垢不消無微不鑑無藴不昭造化周旋孰為臻此垂象從類以彰厥美繄皇秉心淵淨潔澄日新又新聖德孔宏爰熙庶務昭融洞徹光臨下土如彼日月體信達順上格于天天道不違因河以宣彼河斯清匪水所發維皇治功維皇心法治功心法曷徵于河源深流長遺祉之多聖子神孫繩繩繼繼於萬斯年永配天地平安南并序聖天子以皇天眷顧之隆太祖髙皇帝付託之重華夷臣民繫屬之深不容釋乃御大厯服典司神人綱舉目張禮明樂備品物咸遂福祥並臻五年于兹矣而安南賊臣黎季犛戕暴其君魚肉其民侵逼鄰邦侮辱朝使皇上以海島蠻荒不可律以中國憲度逭誅曠罰久矣季犛不知悔禍益肆姦狂於是内而百官外而占城國名合辭請討皇上乃徇輿情命大將帥師征之中軍擣其中左軍折其翼右軍掎其角而占城舟師復扼其奔逸之路季犛自知罪在不赦冒死力抗然而上下解體兵敗身縳其脅從將領邊逺部落悉皆蒲伏乞哀受命于吏請比内郡乃立都指揮布政按察諸司選用守令以撫安其衆累世逋冦一朝剪除報至闕庭内外稱慶臣按周宣王平淮夷唐太宗擒頡利當時文人咸形諸賦詠以紀宏休臣職備民曹敢不採摭事實揄揚帝載發為歌頌以顯示無極頌曰於昭上帝眷命我皇上承大統下撫萬方孰危未寧孰昧未明敷我彞典俾各遂成旰食宵衣不自滿假方趾圓髗咸藉陶冶萬山宗泰衆星拱北駢首弭志無思不服相彼安南稊米黒子敢爾跳梁干我天紀命將往問出車彭彭彼頑率醜奮臂以亢乃褎其徒雞翎是扼金鼓一鳴倒戈以北湯湯富良彼恃天塹我師飛越膽寒心顫土崩瓦解逃生無門草薙禽獮噍類㒺存爰立司牧樹守設宰弔問無辜恤其饑餒乃旬乃宣于仁于禮簞食壺漿我皇久徯稽顙致詞始迷不知詎意今朝重覩漢儀歸語耄倪服我疆畎我怙我恃父母不逺仰祝聖主億載萬年聖子神孫寶祚綿綿周伐淮夷江漢歌雅宋擒劉鋹凱歌獻社斯皆内地奚足揄揚矧兹駿功可無頌章爰摭事實載陳盛美勸忠堲頑垂示無已瑞應騶虞并序恭惟皇帝陛下纘承大統克勤庶政聲教誕敷仁恩旁洽天地既位萬物自育而瑞應駢臻不可殫記乃宣德四年春滁之來安有騶虞二見于石固山南京守臣襄城伯臣李隆以之獻于闕下詔賜羣臣觀之葢猊首虎軀白質黒章修尾隅目而其性甚馴真盛世之瑞物也臣原吉退而稽諸載籍曰騶虞仁獸也天下太平人君有至信之德則應竊嘗考之往古惟見詠于周之詩人自時厥後千數百年之間曠焉莫之覩我朝自太祖髙皇帝肇興鴻業至于太宗文皇帝紹承厥緒積德累仁至深至厚海内康寧四方無警然後騶虞迭出臣獲見焉及我皇上踐祚以來禮樂刑政號令法度之施一遵祖宗之舊與民為信無所更革故和氣充周而兹仁獸復見于滁滁固畿内之地且又兩瑞並出匹休儷美何其盛哉聖德之所感孚皇天之所眷佑于此端可見矣昔者白雉獻于越裳天馬來自西域猶且紀諸策書見于歌詠傳誦至今矧兹嘉瑞出于中國畿内之近者乎是宜被之聲詩以昭聖德垂示無窮臣雖拙于文詞然躬覩盛美不敢以黙謹拜手稽首而獻頌曰惟我聖皇總統萬方禮樂明備治具畢張民安其所物無疪癘和氣氤氲鍾為嘉瑞惟兹嘉瑞匪熊匪貔匪角匪鬛曰惟騶虞𤣥靈之文玉雪之質修尾囘風雙瞳炯日饑不暴物行避生芻由心之仁匪人之驅神行電邁千里一息其性則然不以其力侶遊儷美同出一時不産他邦乃在郊畿守臣致之獻于丹闕自然馴伏聖情欣悦百辟環覩歡動明廷曰惟慈獸瑞世之徵惟瑞之徵惟天子聖聖德格天受天之慶惟慶之錫惟天子明聖壽齊天億千萬齡瑞應白烏并序皇帝臨御之五年實為宣德之四年廣東海陽民以二白烏來獻進覽之次賜羣臣觀于廷雪質瓊姿𤣥眸玉喙怡然馴淑之態充然慈孝之心誠盛代之嘉禎太平之上瑞其出也豈偶然哉謹按瑞應圖曰帝王禮敬宗廟備于孝慈則白烏見又曰帝王肅敬宗廟仁孝篤至則白烏見欽惟我皇上稟聰明睿智之資備文武聖神之德自纂承丕緒以來夙夜孜孜勵精圖治簡任賢俊而興修禮樂旌別淑慝以振立紀綱明罰慎刑期民無愁歎之聲薄賦輕徭冀野有謳歌之樂至于承事宗廟則尤嚴禮敬奉養聖母則篤盡孝誠無一事而不適中無一物而不得所是以穹祗昭格海宇清寧和氣充溢乎兩間皇風彌布乎六合凡諸福之祥諸物之瑞莫不駢臻叠至以應昌期然不能一二足也故此白烏雙見于海陬而其民之愛戴乎上者不逺萬里貢于闕廷以兆我國家萬萬年太平悠久之徵以昭我皇上萬萬年仁孝廣大之德猗歟盛哉臣叨列清班獲瞻竒瑞雖才識疎陋不足以稱揚盛美然欣忭之餘不能自黙謹拜手稽首而獻頌曰於昭我皇聖神文武纂承丕圖撫有九土九土奕奕兆姓蚩蚩匪𢎞治化曷臻雍熙乃殫聖衷乃勤聖質宵分而衣日昃而食旌別淑慝登崇俊良制禮作樂振紀立綱禮樂昭宣紀綱明肅惟賦惟刑是輕是恤百度既飭庶績咸熙仰惟宗廟敢忘孝思孝思維何奉先追逺禴祠烝嘗一嚴禮典載惟聖母壽慶天齊致孝致養前聖曷希於周有昌於虞有舜皇心同之篤盡敬順敬順既篤聖德益隆穹祇昭格神明感通充充兩間和氣勃鬱靈貺薦臻嘉祥叠出乃嵗己酉七月仲秋爰有雙烏見于海陬雪質鮮明霜姿瑩潔修喙啄瓊𤣥眸㸃墨不驚而擾不暴而侵馴淑之態孝慈之心貯以雕籠羃以文帛逺駕星軺入貢天闕龍顔悦視臣鄰聚觀懽騰丹陛喜溢金鑾惟此雙烏實國之瑞聖壽以彰聖心以慰嗟嗟小兆叨際清時覩此嘉瑞贊詠敢稽惟皇聖明道超三五安輯羣黎繩其祖武惟皇聖明壽齊天地萬億子孫傳承無替賦麒麟并序永樂十二年秋榜葛刺國來朝獻麒麟今年秋麻林國復以麒麟來獻其形色與古之傳記所載及前所獻者無異臣聞麒麟瑞物也中國有聖人則至昔軒轅時來游于囿成康之世見于郊藪是後未之聞也今兩嵗之間而兹瑞載至則聖德之隆天眷之至實前古所未有也宜播之聲詩以傳示無極臣忝職地官屢覩盛美不揆蕪陋謹拜手稽首而獻賦曰惟我皇之明聖兮膺天命而御極環六合以為家統四裔而混一化洽殊方仁覆萬物和氣所鍾禎祥叠出而仁瑞之獸所以復獻于今日也爾其滄海之濱瑞氣勃鬱𤣥枵降精二儀合德熒光燭天輝耀赫奕山嶽為之炫映江海為之滋液百獸為之奔衞萬靈為之拱翼而麒麟于是生焉豐骨神異靈毳瑩潔霞明龍首雲擁鳳臆星眸眩兮焜耀龜文燦兮煜曄牛尾拂兮生風麕身動兮散雪蹴馬蹄兮香塵接腕聳肉角兮玉山貫額步無躑躅必中規而蹈矩聲無哮闞自協商而應律固不犯乎陷阱亦豈傷乎生物是以不奮而威不猛而烈虎豹見之遁藏犀兕遇之辟易封狶巨㹶雖悍戾而誰羡麏麚豺貉顧旁午其何益彼漢廷之甪端徒自誇其美而渥洼之神駿焉能與之匹兹實聖世之竒瑞匪有資于人力此所以海隅島夷不敢自逸乃梯山而航海于以獻于中國于是離遐陬道滄溟越重譯望帝京侑之以方物達之以至誠匪惟効職于王㑹葢將昭德于聖明于是時也天門洞開衮龍在御瑞物既呈祥烟斯布散精彩于彤墀濯儀文于甘露或昻首而欲鳴或跪起而欲舞重瞳載顧百辟歡欣曰惟此獸希有之珍昔在軒轅曾一來馴暨周成康郊藪是臻厯千載而及兹乃有感于皇仁越期嵗而再至實前古所未聞是宜播之聲詩勒之金石著盛治之無窮延休徵于莫極顧微臣之謭謭覩盛美而愉懌爰稽首而獻賦頌聖德于萬一贊瑞象并序臣原吉稽首頓首言伏惟皇上以神聖大德受天明命統馭萬方海宇清寧福瑞咸集兹者占城國來貢瑞象玉質鮮明雪花竒麗粲然星斗之文炳然雲霞之彩蠻夷酋長拜獻于金闕之前玉陛之下郁郁彬彬光彩照耀聖情怡悦臣民懽慶正當皇上建玉京成寶殿之日庶民子來謳歌鼓舞趨事効力不督而成嘉祥竒瑞紛紜而至况兹瑞象出于海外遐荒之地重譯而來曠古未有自今而見則所以昭皇上功業之廣大德化之逺孚以固萬萬年永久之鴻業以隆萬萬年一統之太平夫豈偶然之故哉昔者文王作靈臺詩人詠歌不過游魚白鳥而漢世芝房赤雁亦見于樂歌宋太祖乾德中有馴象玉之瑞有司請製旗以郊太宗太平興國中宰臣請圖諸瑞物以昭盛治以我皇明觀之太平福瑞之盛豈不過于古昔萬萬也哉誠宜宣付史官命諸文學之臣參議典禮歌于樂章著于鑾旂圖于瑞牒郊祀宗廟以享神靈揚芳宣烈以昭萬世天下幸甚而臣愚昧幸䝉聖恩備位地官無以補報恭覩嘉瑞不勝懽忻謹拜手稽首而獻贊曰三階平萬國寧瑤光明瑞象呈霞文布體白凝玉雪花萬㸃圓粧瓊想當生時最竒異百神呵䕶宣光靈青天雲開月揚彩碧海鏡淨波流清應我聖皇德萬里來占城黄金為絡珠為瓔玉階獻之怡皇情瓊林遥映玉華麗瑞日下照祥光明皇德𢎞聖治成制禮作樂昭昇平麒麟生鸞鳳鳴牟麥遍野嘉禾登從兹萬萬年垂衣坐天廷小臣願效華封祝地久天長播頌聲忠靖集巻一
