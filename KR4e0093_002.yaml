body:
  text: 忠靖集卷二明夏原吉撰五言古詩題梅石處士詩卷後晉宋有明哲陶林相後先陶以菊自逸林以梅稱仙芳譽藹當代髙名照遺編今我趙處士抱道希昔賢孑孑謝世故悠悠樂林泉買梅更買石栽布軒忩前梅兮肖清白石兮表貞堅清白期不穢貞堅冀無諼嵗晏萬物瘁梅芳石初鮮拉彼林下叟觴詠梅石邊詩成倚梅歌酒醉拂石眠歌聲落寒玉眠席分晴烟俯仰睂睫外細大徒喧喧詎如梅與石及我同一天所以永結託要躐陶林肩集賢諸大老交素知其然爰贈梅石號重賦梅石篇鏗鏘振金玉至今子孫傳恨豫生太晚不能拜當年翹翹仰梅石作詩寫餘箋寫罷復展誦清風竦毛顛題常執中無息齊天道何剛健運行若機旋晝夜弗暫息今古或無愆四時以代謝萬物資陶甄嗟哉果何如惟其一誠焉不見古君子體道心拳拳賢兮則希聖聖兮則希天兢兢著謨典亹亹垂詩篇宣尼歎逝水孟氏稱源泉禹隂分寸惜陶甓朝昏遷銛錐季子讀圓枕溫公眠所進雖各異所志同一堅眷彼蚩蚩氓相去霄壤懸靈臺既茫昧德基任摧顛髙明邈難入汙下甘伏跧晚途或有悔疇能返流年吾湘常氏子學古知其然髙齊扁無息翼翼臨江邊不華亦不隘非郭亦非㕓軒窗貯經史几席羅毫箋端居究𤣥賾終日惟乾乾德業遂精進聲華益昭宣徵書忽相迫試藝臨文淵琳琅有餘響隙吹胡能聮英英冠多士籍籍膺髙銓暫別京國友逺泛端溪船民事固雜沓夙心敢云諼朝焉戴星出夕焉戴星還吏案無留牘琴堂弗聞鞭一篝照清夜典籍還窮研匪曰釣時譽所希在聖賢顧我何放曠百行無一全庸庸竊君祿華髮將垂肩感子名齊義自愧還自憐壯心日以鈍安能重磨鐫願子慎終始勿謂百里牽鵬摶必九萬驥騁須三千矧今聖明世簡拔無私偏坦蕩青雲路㑹當恣髙騫周覽上林春滿挹龍樓烟對揚吐竒藴獻納攄忠䖍躋民太和域致君唐虞前功名著青史耿耿千秋傳題彭希益惜隂堂星沙控荆湖屬邑十有二羅湘甲西北山水獨佳麗彭君生其間鍾此山水異襟宇既軒豁丰儀更清粹垂髫被庭訓詩禮日講肄諄諄期有成勉勉冀無墜豈謂霜露嚴毒被椿木瘁倣徨痛遺業感慨念先志乾乾仰居諸耿耿忘食寐搆堂名惜隂于以自針勵朝斯萬卷開夕爾一篝繼探搜聖賢心玩索古今事毫芒靡或遺纎悉必精至時當大比秋踏槐赴鄉試聲華動場屋文藻賁同類惟君自持謙不欲早干位春闈暫垂翮卒業辟雍地清修日益勤閫奧愈深詣嗟豫素薄劣忝有鄉曲誼每瞻惜隂堂中心竊懷愧願言慎終始毋使虧一簣行當馭長風扶搖九天際宮花醉蒲萄黃金耀名字逺追伊召心光輔堯舜治功成銘鼎彞芳譽永無替回視惜隂堂煌煌孰能企諭饑烏饑烏來屋頭軒然振雙翼啞啞向我啼其意欲得食我行顧我㕑餘糗頗云積粲粲白如銀瑩瑩燥如炙足可療烏饑盡與非所惜緣以目前人困乏動千億賑恤未有方夙夜慨中赤况此所餘糗粒粒出民力我食尚懷愧飼烏寧不惕饑烏勿此啼山林有榛栗冬日聞蛙蓐收已回轅𤣥冥正司令草木盡黃落蟄蟲俯而靜爾蛙何從來恍焉失初性凌寒發狂聲聒聒莫知竟捕之良可矜聆之顧非正願爾深自默毋為駭時聽題扇面莊子觀泉銀潢半天來窈窕幾千尺空林送清聲遙壁蕩晴色炎晨坐披襟涼氣拍胸臆吁嗟南華翁髙懷有誰識泉州次吳中書韻區區南閩來蓂莢屢更易鞍馬厭道途風霜改絺綌豈無林淵思民痍未痊革引睇桐城樓寒雲萬山白宿檇李天寧寺息軺古招提時維孟冬莫天氣熙如春宵蛩起幽訴獨聆不能眠披衣坐風露緬懷踏歌人翹翹亦何故武康縣湖州武康縣僻在羣山中人稀官事少土沃禾稼豐蠶時戶戶箔雞曉家家舂鮮菱采秋夏嫩笋庖春冬廛幽商寡集溪曲舟難通兒童拙市語父老髙村容淳淳良可尚擾擾希能同愧無召杜吏重造朱陳風作詩慰我民政俗宜自隆贈琴士李忠禮偉哉太白孫英英越中士來作湘江遊光風曄蘭芷抱琴為豫彈清音驚俗耳雍雍鳳鸞聲悠悠聖賢理他日遇鍾期毋慚奏流水五言律詩錢塘江浩渺惟天濶茫洋與海通赭龕二山名分左右吳越界西東鷗弄潮頭雪龍吟水面風鴟夷在何處試問打魚翁經姑蘇客路尚悠悠蘇臺暫繫舟酒旗迷栁岸商舶隘江流三讓祠何古千人石更幽可憐城下水莫洗館娃愁寄友憶昔㑹皇州壺觴日勸酬一時同作客萬里各經秋湘浦西風棹燕山夜月樓無窮蕭索意兩地一般愁憶別四首憶別金陵日髙堂曉拜辭諄諄垂訓語切切問歸期縮地嗟無術看雲謾賦詩聊憑問安字逺慰倚閭思二憶別金陵日那勝手足情泪縣棠棣雨腸斷鶺鴒聲姜被清宵冷璠璵何日迎願言知此意蚤促北來程三憶別金陵日吾兒嵗始三見人容嶷嶷學語舌喃喃雖乏麒麟譽應無豚犬慙行當還帝里為汝說周南四憶別金陵日春風二月時求朋鶯語急送客燕飛遲北邸俄淹嵗南歸未卜期遙遙天上友莫動暮雲思東吳述懷三首為客東吳郡秋過冬復深梅粧崑阜玉橘剪洞庭金顛倒還家夢倣徨戀闕心何時了王事蘭棹起歸音二為客東吳郡民艱日轉深撫躬慙食祿汗顙愧腰金願廣乾坤澤均濡草木心萬方歌至治永叶太平音三為客東吳郡年深情亦深每慙三省語常畏四知金落落誰青眼寥寥自赤心寄言天上友雁到好傳音題醫者蔣彥升鳳山書屋幽居對鳳臺鳳去幾時來濟世書千卷怡神酒一杯秋風橘顆熟春雨杏花開自是縣壺侶都人莫浪猜寓雲居菴次韻答聮上人誰闢雲居境依稀古化城獅柑霜過熟鳳竹雨來青石悟禪中語鐘收飯後聲我來臨絶頂一覽小蓬瀛泊金沙洲晚泊金沙洲曉登洲上樓雲峯隨處好烟浪拍天浮掃壁看遺墨憑欄數過舟家山應不逺此地且優游客興去住何無定朝西莫復東姓名輕草木客貌熟兒童安得尋陶令相攜訪逺公秫香新藕白笑詠虎溪風到家後書懷六載宦神州今歸覲祖丘眼看前輩少指㸃後生稠松菊從荒穢壺觴且勸酬鶯花明上苑又駕建康舟登范公亭偶上范公亭亭幽感慨生竹添今嵗笋塵掩昔年檠老蠧隨人化孤禽向客鳴欄傾不堪倚惆悵下階行自歎少小頗聰明年來頓不成目嫌書字細耳恨語聲輕對酒渾無趣逢人屢忘名何如漢疏傅林下樂餘生挽髙主事母原氏板輿迎養日綵服奉觴時春色凝萱樹秋香滿桂枝昊天何不弔𤣥壤遽長辭杳杳靈輀去三山草木悲挽兵部侍郎盧公偉矣盧司馬南州第一流龍庭深眷顧雲路久遨遊忽感槐南夢真成水上漚孤兒何所恃永抱蓼莪愁五言排律聖德瑞應詩永樂己亥秋海外忽魯謨斯等國遣使來進麒麟獅子天馬文豹紫象駝雞昂首髙七尺福祿似駝而花文可愛靈羊尾大者重二十餘斤行則以車載其尾長角馬哈獸角長過身五色鸚鵡等鳥又交趾進白烏山鳳三尾龜等物賜觀于庭承制賦此聖主膺乾運垂衣馭八區道隆堯舜比功茂禹湯俱蕩蕩三邊肅熙熙兆姓娛普天歌至治率土發靈儲爰有諸蕃國能忘萬里途隨槎超瀚漫獻瑞效勤渠渺渺來中夏惓惓覲帝居麒麟呈玉陛獅子貢金鋪紫象靈山種驊驑渥水駒駝雞同鸑鷟文豹擬騶虞福祿身紆錦靈羊尾載車霜姿狷更異長角獸尤殊綵檻竒音鳥雕籠雪色烏𤣥龜三尾曵山鳳五花敷日上龍墀麗風回鳳閣迂禮官躬典設蕃使肅奔趨仙掌開丹扆祥烟散紫衢重瞳欣一顧百辟震三呼兹豈尋常致端由治化孚既將昭帝德尤足壯神都炎漢何能擬姬周莫並驅拜瞻嗟慶幸稱讚愧荒疏惟願皇風洽仍祈化日舒鴻圖千載固聖壽萬年餘送李郎中新歸南陽省墓南陽有佳士年富才華充壁水暫遊憩天曹遽登庸試事建寧幕頤情武夷峯能聲沸衆口芳譽聞宸聰徵還鳳墀下超任烏臺中峩峩冠金豸表表乘玉驄豺羣頓掃跡鼠穴無留蹤漢桓讓先轡唐溫仰髙風俄轉虞衡郎力贊冬官工政績日益著秩祿時尤隆緬懷三釡榮弗逮雙親躬遑遑風木悲耿耿羮牆容九京渺何處萬感徒填胸濡毫寫中素呌閽謁重瞳松楸許歸省椿萱更褒崇鸞誥絢五色天章炳雙龍存殁總光被古今實希逢百拜謝丹闕三祝效華封驅車向晨出祖帳如雲叢浩飲倒鸚鵡髙歌遏冥鴻都忘去路遙共喜歸興濃到家擬何時屈指應初冬錦衣照丘壠竹馬喧兒童故舊逺問遺親姻競過從雞肥酒正熟樂極情曷窮第念丈夫志不與流輩同凌摩必霄漢棲息羞蒿蓬聖朝况當寧小大咸獻功展墓茍云畢趨朝敢辭匆亟駕青雲翼來覲黃金宮及時樹勳業努力全孝忠嗟哉晝錦堂豈獨韓魏公題魯林懷思圖宋德中衰日君家南渡時岱宗雲鬱鬱浙水路遲遲豈意僑居地真成永世基祖林千里隔族派一支離喜有賢孫子能承宣父規家聲衢再振宦業魯無差準也尤人傑榮哉遇主知容臺司禮樂朝列仰風儀爰感詩書澤深懷水木悲迢迢盻洙泗耿耿夢防尼圖寫真人筆文摛學士辭既將舒繾綣還足警澆漓顧我何為者勞君索賦詩竊惟先聖裔敢以衆人期願謹過庭訓毋忘報國思光前仍裕後千載令名垂詠慈烏我愛慈烏好慈烏孝且靈親恩思返哺人事為先鳴沐雨緇衣潔騫風墨翅輕白鷗非所侶𤣥鳥頗堪朋萃立虞庭異羣飛栁第榮吻傷新邑號柏集著臺名世罕雌雄辨人惟孝義稱嗟哉梟與獍視爾愧何勝忠靖集卷二
