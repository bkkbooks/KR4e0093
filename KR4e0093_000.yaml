body:
  text: 忠靖集别集類五明提要臣等謹案忠靖集六卷明夏原吉撰原吉字維哲湘陰人以鄉薦遊太學選授户部主事官至户部尚書諡忠靖事迹具明史本傳原吉詩文集六卷載於明史藝文志與此集卷數相合蓋即舊本後附遺事一卷為其孫廷章所輯刋板久佚此本乃國朝康熙乙酉潘宗洛提督湖廣學政時得其裔孫所藏重為校刋前有楊溥序稱其詩文平實雅淡不事華靡雖原吉以政事著不以文章著洪永之際作者如林固不能與宋濂王褘諸人齊驅方駕然致用之言疏通暢達以肩隨楊士奇黃淮等殆可無愧色矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀忠靖集原序少保兼太子太師户部尚書長沙夏公詩文遺稿常州太守桂林莫君子朴以其俸餘鋟梓公之子尚寶司丞瑄請豫序公之德存乎人望隆一時有以服人之心感人之情况所寓諸詩文皆本學問亦不可泯也公儒家子天性眀敏而溫厚加以詩書涵濡之以成其器在邑里時即有善譽洪武中由鄉薦入太學試地官屬各司疑難往質問之而悉以理折衷不以利害為心遂有聲於朝未幾自部僚超拜亞卿尋升大司徒經賦之政寬而有制國用以充民不告乏遂馳聲於天下立朝四十年餘每議大政務從寬厚處同官未嘗失色待僚屬取其所長略其所短以是人多德之宣宗皇帝為皇太孫時公受命輔導三朝實録皆預監修公於理有定見故其所行夷險無間人以為難列秩六卿位次三公人不以為過時論朝之大臣有德量者以公為冠卒之日朝野惜之追贈太師諡忠靖録用其子此其始終大概也詩文平實雅淡不事華靡觀者亦可想見其為人也公在永樂中攝冬官政子朴嘗為冬官郎中相知為深在常爼豆之事則有司存子朴厯官已四考政和民浹用心於此良厚矣又能使公詩文得傳聞於人殆知言者哉豫亦湖湘人嘗得與公同事用是書之簡首云正統八年嵗次癸亥春二月榖旦光祿大夫柱國少保禮部尚書兼武英殿大學士國史總裁同知經筵事南郡楊溥序
